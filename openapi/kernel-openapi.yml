  /browsers/{id}/telemetry:
    get:
      summary: Stream telemetry events via SSE
      description: >
        Streams browser telemetry events as a server-sent events (SSE) stream.
        The stream closes when the browser session terminates. Each event frame
        includes an id: field containing a monotonically increasing sequence
        number; pass it as Last-Event-ID on reconnect to resume without gaps.
        The event: field is never set; all frames carry JSON in the data: field.
        A keepalive comment frame is sent every 15 seconds when no events
        arrive. Returns 404 if the browser session does not exist. If telemetry
        was not enabled on the session, the stream opens but no events are
        delivered.
      operationId: streamBrowserTelemetry
      tags:
        - Browser Telemetry
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
          description: Browser session ID
        - name: Last-Event-ID
          in: header
          schema:
            type: string
          description: >-
            Last event sequence number for SSE reconnection (sent by SSE clients
            on reconnect)
      responses:
        '200':
          description: SSE stream of telemetry events
          headers:
            X-SSE-Content-Type:
              description: Media type of SSE data events (always application/json).
              schema:
                type: string
                const: application/json
          content:
            text/event-stream:
              schema:
                $ref: '#/components/schemas/BrowserTelemetryEventEnvelope'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalError'
      x-codeSamples:
        - lang: JavaScript
          source: |-
            import Kernel from '@onkernel/sdk';

            const client = new Kernel({
              apiKey: process.env['KERNEL_API_KEY'], // This is the default and can be omitted
            });

            const response = await client.browsers.telemetry.stream('id');

            console.log(response.event);
        - lang: Python
          source: |-
            import os
            from kernel import Kernel

            client = Kernel(
                api_key=os.environ.get("KERNEL_API_KEY"),  # This is the default and can be omitted
            )
            for telemetry in client.browsers.telemetry.stream(
                id="id",
            ):
              print(telemetry)
        - lang: Go
          source: "package main\n\nimport (\n\t\"context\"\n\t\"fmt\"\n\n\t\"github.com/kernel/kernel-go-sdk\"\n\t\"github.com/kernel/kernel-go-sdk/option\"\n)\n\nfunc main() {\n\tclient := kernel.NewClient(\n\t\toption.WithAPIKey(\"My API Key\"),\n\t)\n\tstream := client.Browsers.Telemetry.StreamStreaming(\n\t\tcontext.TODO(),\n\t\t\"id\",\n\t\tkernel.BrowserTelemetryStreamParams{},\n\t)\n\tfor stream.Next() {\n\t\tfmt.Printf(\"%+v\\n\", stream.Current())\n\t}\n\terr := stream.Err()\n\tif err != nil {\n\t\tpanic(err.Error())\n\t}\n}\n"
