openapi: 3.1.0
info:
  title: Kernel API
  description: Developer tools and cloud infrastructure for AI agents to use web browsers
  version: 0.1.0
servers:
  - url: https://api.onkernel.com
    description: API Server
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
  schemas:
    ErrorDetail:
      type: object
      properties:
        code:
          type: string
          description: Lower-level error code providing more specific detail
          example: invalid_input
        message:
          type: string
          description: Further detail about the error
          example: Provided version string is not semver compliant
    Error:
      type: object
      required:
        - code
        - message
      properties:
        code:
          type: string
          description: Application-specific error code (machine-readable)
          example: bad_request
        message:
          type: string
          description: Human-readable error description for debugging
          example: 'Missing required field: app_name'
        details:
          type: array
          description: Additional error details (for multiple errors)
          items:
            $ref: '#/components/schemas/ErrorDetail'
        inner_error:
          $ref: '#/components/schemas/ErrorDetail'
    ManagedAuthError:
      type: object
      description: >-
        Extended error response for managed auth operations with recovery
        context
      required:
        - code
        - message
      properties:
        code:
          type: string
          description: Machine-readable error code for programmatic handling
          enum:
            - login_form_not_found
            - navigation_confused
            - domain_not_allowed
            - stuck_in_loop
            - max_attempts_reached
            - website_error
            - network_error
            - element_not_found
            - credentials_invalid
            - mfa_required
            - external_action_required
            - unsupported_auth_method
            - bot_detected
            - captcha_blocked
            - session_expired
            - no_active_flow
            - flow_failed
            - awaiting_input_timeout
            - external_action_timeout
            - max_steps_exceeded
            - browser_error
            - internal_error
          example: login_form_not_found
        message:
          type: string
          description: Human-readable error message suitable for display
          example: >-
            We couldn't find a login form on this page. The website may have
            changed its layout, or the login URL might be incorrect.
        details:
          type: string
          description: Additional technical details for debugging (not shown to end users)
          example: >-
            Searched for login forms at https://example.com/login, found 0 form
            elements
        doc_url:
          type: string
          format: uri
          description: Link to documentation about this error
          example: https://docs.onkernel.com/errors/login_form_not_found
        recoverable:
          type: boolean
          description: Whether the user can retry or take action to resolve this error
          example: true
    InvokeResponse:
      type: object
      properties:
        id:
          type: string
          description: ID of the invocation
          example: rr33xuugxj9h0bkf1rdt2bet
        action_name:
          type: string
          description: Name of the action invoked
          example: analyze
        status:
          type: string
          description: Status of the invocation
          enum:
            - queued
            - running
            - succeeded
            - failed
          example: queued
        status_reason:
          type: string
          description: Status reason
          example: Invocation queued for execution
        output:
          type: string
          description: >-
            The return value of the action that was invoked, rendered as a JSON
            string. This could be: string, number, boolean, array, object, or
            null.
          example: '{"result":"success","data":"processed input"}'
      required:
        - id
        - action_name
        - status
    Invocation:
      type: object
      properties:
        id:
          type: string
          description: ID of the invocation
          example: rr33xuugxj9h0bkf1rdt2bet
        app_name:
          type: string
          description: Name of the application
          example: my-app
        version:
          type: string
          description: Version label for the application
          example: 1.0.0
        action_name:
          type: string
          description: Name of the action invoked
          example: analyze
        payload:
          type: string
          description: >-
            Payload provided to the invocation. This is a string that can be
            parsed as JSON.
          example: '{"data":"example input"}'
        output:
          type: string
          description: >-
            Output produced by the action, rendered as a JSON string. This could
            be: string, number, boolean, array, object, or null.
          example: '{"result":"success","data":"processed input"}'
        started_at:
          type: string
          format: date-time
          description: RFC 3339 Nanoseconds timestamp when the invocation started
          example: 2024-05-19T15:30:00.000000000Z07:00
        finished_at:
          type: string
          format: date-time
          nullable: true
          description: >-
            RFC 3339 Nanoseconds timestamp when the invocation finished (null if
            still running)
          example: 2024-05-19T15:30:05.000000000Z07:00
        status:
          type: string
          description: Status of the invocation
          enum:
            - queued
            - running
            - succeeded
            - failed
          example: succeeded
        status_reason:
          type: string
          description: Status reason
          example: Invocation completed successfully
      required:
        - id
        - app_name
        - version
        - action_name
        - started_at
        - status
    Browser:
      type: object
      properties:
        created_at:
          type: string
          format: date-time
          description: When the browser session was created.
        cdp_ws_url:
          type: string
          description: >-
            Websocket URL for Chrome DevTools Protocol connections to the
            browser session
          example: >-
            wss://proxy.yul-upbeat-herschel.onkernel.com:8443/browser/cdp?jwt=eyJ0eXAi...
        webdriver_ws_url:
          type: string
          description: Websocket URL for WebDriver BiDi connections to the browser session
          example: >-
            wss://proxy.yul-upbeat-herschel.onkernel.com:8443/browser/webdriver/session?jwt=eyJ0eXAi...
        browser_live_view_url:
          type: string
          description: >-
            Remote URL for live viewing the browser session. Only available for
            non-headless browsers.
          example: >-
            https://proxy.yul-upbeat-herschel.onkernel.com:8443/browser/live?jwt=eyJ0eXAi...
        base_url:
          type: string
          description: Metro-API HTTP base URL for this browser session.
          example: https://proxy.yul-upbeat-herschel.onkernel.com:8443/browser/kernel
        headless:
          type: boolean
          description: Whether the browser session is running in headless mode.
          example: false
        stealth:
          type: boolean
          description: Whether the browser session is running in stealth mode.
          example: false
        gpu:
          type: boolean
          description: >-
            Whether GPU acceleration is enabled for the browser session (only
            supported for headful sessions).
          example: false
        session_id:
          type: string
          description: Unique identifier for the browser session
          example: htzv5orfit78e1m2biiifpbv
        timeout_seconds:
          type: integer
          description: >-
            The number of seconds of inactivity before the browser session is
            terminated.
        profile:
          $ref: '#/components/schemas/Profile'
        proxy_id:
          type: string
          description: ID of the proxy associated with this browser session, if any.
        pool:
          $ref: '#/components/schemas/BrowserPoolRef'
        viewport:
          $ref: '#/components/schemas/BrowserViewport'
        kiosk_mode:
          type: boolean
          description: Whether the browser session is running in kiosk mode.
          example: false
        start_url:
          type: string
          description: >-
            URL the session was asked to navigate to on creation, if any.
            Recorded for debugging. Navigation is fire-and-forget — the URL is
            dispatched to the browser without waiting for it to load, and any
            errors (DNS failure, bad status, timeout) are silently dropped.
            Captures what was requested, not what the browser actually loaded.
          example: https://example.com
        chrome_policy:
          type: object
          additionalProperties: true
          description: >
            Custom Chrome enterprise policy overrides that were applied to this
            browser session, if any. Echoed back for verification. Keys are
            Chrome enterprise policy names.
        deleted_at:
          type: string
          format: date-time
          description: >-
            When the browser session was soft-deleted. Only present for deleted
            sessions.
        usage:
          $ref: '#/components/schemas/BrowserUsage'
        telemetry:
          $ref: '#/components/schemas/BrowserTelemetryConfig'
          nullable: true
          description: Active telemetry configuration for the session, if any.
      required:
        - created_at
        - cdp_ws_url
        - webdriver_ws_url
        - session_id
        - stealth
        - headless
        - timeout_seconds
    BrowserRequest:
      type: object
      description: |
        Parameters for creating a browser session.
      properties:
        invocation_id:
          type: string
          description: action invocation ID
          example: rr33xuugxj9h0bkf1rdt2bet
        stealth:
          type: boolean
          description: >-
            If true, launches the browser in stealth mode to reduce detection by
            anti-bot mechanisms.
          example: true
        headless:
          type: boolean
          description: >-
            If true, launches the browser using a headless image (no VNC/GUI).
            Defaults to false.
          example: false
        gpu:
          type: boolean
          description: >-
            If true, enables GPU acceleration for the browser session. Requires
            Start-Up or Enterprise plan and headless=false.
          example: false
        timeout_seconds:
          type: integer
          description: >-
            The number of seconds of inactivity before the browser session is
            terminated. Activity includes CDP connections and live view
            connections. Defaults to 60 seconds. Minimum allowed is 10 seconds.
            Maximum allowed is 259200 (72 hours). We check for inactivity every
            5 seconds, so the actual timeout behavior you will see is +/- 5
            seconds around the specified value.
          minimum: 10
          maximum: 259200
        profile:
          $ref: '#/components/schemas/BrowserProfile'
        extensions:
          type: array
          description: >-
            List of browser extensions to load into the session. Provide each by
            id or name.
          maxItems: 20
          items:
            $ref: '#/components/schemas/BrowserExtension'
        proxy_id:
          type: string
          description: >-
            Optional proxy to associate to the browser session. Must reference a
            proxy belonging to the caller's org.
        viewport:
          $ref: '#/components/schemas/BrowserViewport'
        kiosk_mode:
          type: boolean
          description: >-
            If true, launches the browser in kiosk mode to hide address bar and
            tabs in live view.
          example: true
        start_url:
          type: string
          description: >-
            Optional URL to open when the browser session is created. Navigation
            is best-effort, so navigation failures do not prevent the session
            from being created.
          example: https://example.com
        chrome_policy:
          type: object
          additionalProperties: true
          description: >
            Custom Chrome enterprise policy overrides applied to this browser
            session. Keys are Chrome enterprise policy names; values must match
            their expected types. Blocked: kernel-managed policies (extensions,
            proxy, CDP/automation). See
            https://chromeenterprise.google/policies/
        telemetry:
          $ref: '#/components/schemas/BrowserTelemetryConfig'
          nullable: true
          description: >-
            Telemetry configuration for the browser session. If provided,
            telemetry capture starts with the specified category filter when the
            session is created. If omitted, no telemetry capture is started.
      required: []
    BrowserUsage:
      type: object
      description: Session usage metrics.
      properties:
        uptime_ms:
          type: integer
          description: Time in milliseconds the session was actively running.
      required:
        - uptime_ms
    BrowserPoolRef:
      type: object
      description: Browser pool this session was acquired from, if any.
      properties:
        id:
          type: string
          description: Browser pool ID
        name:
          type: string
          description: Browser pool name, if set
      required:
        - id
    BrowserUpdateRequest:
      type: object
      description: Request body for updating a browser session.
      properties:
        proxy_id:
          type: string
          nullable: true
          description: >-
            ID of the proxy to use. Omit to leave unchanged, set to empty string
            to remove proxy.
        disable_default_proxy:
          type: boolean
          description: >-
            If true, stealth browsers connect directly instead of using the
            default stealth proxy.
        profile:
          $ref: '#/components/schemas/BrowserProfile'
          description: >-
            Profile to load into the browser session. Only allowed if the
            session does not already have a profile loaded.
        viewport:
          $ref: '#/components/schemas/BrowserViewportUpdate'
          description: Viewport configuration to apply to the browser session.
        telemetry:
          $ref: '#/components/schemas/BrowserTelemetryConfig'
          nullable: true
          description: >
            Telemetry configuration. Omit, set to null, or set to an empty
            object ({}) to leave the existing configuration unchanged (no-op).
            To enable capture for all categories using VM defaults, set browser
            to an empty object ({"browser": {}}). To stop capture, set every
            category's enabled to false.
    BrowserTelemetryConfig:
      type: object
      description: Telemetry configuration for a browser session.
      properties:
        browser:
          $ref: '#/components/schemas/BrowserTelemetryCategoriesConfig'
          description: >-
            Per-category enable/disable flags. If omitted, all categories are
            captured.
    BrowserTelemetryCategoriesConfig:
      type: object
      description: Per-category telemetry capture settings.
      properties:
        console:
          $ref: '#/components/schemas/BrowserTelemetryCategoryConfig'
          description: Console output (log, warn, error) and uncaught exceptions.
        page:
          $ref: '#/components/schemas/BrowserTelemetryCategoryConfig'
          description: >-
            Page lifecycle events including navigation, DOMContentLoaded, load,
            layout shifts, and LCP.
        interaction:
          $ref: '#/components/schemas/BrowserTelemetryCategoryConfig'
          description: >-
            User interaction events including clicks, keydowns, and
            scroll-settled events.
        network:
          $ref: '#/components/schemas/BrowserTelemetryCategoryConfig'
          description: >-
            HTTP request and response metadata including URL, method, status
            code, and timing. Request post data is forwarded as-is from CDP.
            Text response bodies are truncated at 8 KB for structured types
            (JSON, XML, form data) and 4 KB for other text types. Binary
            responses (images, fonts, media) are excluded.
    BrowserTelemetryCategoryConfig:
      type: object
      description: Per-category telemetry configuration.
      properties:
        enabled:
          type: boolean
          description: Whether this category is captured. Defaults to true if omitted.
    BrowserEventSource:
      type: object
      description: Provenance metadata identifying which producer emitted the event.
      required:
        - kind
      properties:
        kind:
          type: string
          enum:
            - cdp
            - kernel_api
            - extension
            - local_process
          description: >-
            Event producer. cdp: Chrome DevTools Protocol events from the
            browser. kernel_api: Kernel API server. extension: injected Chrome
            extension. local_process: system process running alongside the
            browser.
        event:
          type: string
          description: >-
            Producer-specific event name (e.g. Runtime.consoleAPICalled for
            CDP-sourced console events, Runtime.exceptionThrown for uncaught
            exceptions).
        metadata:
          type: object
          description: Producer-specific context (e.g. CDP target/session/frame IDs).
          additionalProperties:
            type: string
    BrowserCallStack:
      type: object
      description: >-
        CDP Runtime.StackTrace representing the JavaScript call stack at the
        time of an event. Fields use CDP naming conventions rather than
        snake_case to match the Chrome DevTools Protocol wire format.
      required:
        - callFrames
      properties:
        description:
          type: string
          description: Optional label for the stack trace (e.g. async cause).
        callFrames:
          type: array
          description: Ordered list of call frames, outermost first.
          items:
            type: object
            required:
              - functionName
              - scriptId
              - url
              - lineNumber
              - columnNumber
            properties:
              functionName:
                type: string
                description: >-
                  JavaScript function name, or empty string for anonymous
                  functions.
              scriptId:
                type: string
                description: CDP script identifier.
              url:
                type: string
                description: URL or name of the script file.
              lineNumber:
                type: integer
                description: Zero-based line number within the script.
              columnNumber:
                type: integer
                description: Zero-based column number within the line.
        parent:
          $ref: '#/components/schemas/BrowserCallStack'
          description: Parent stack trace for async stacks.
    BrowserHttpHeaders:
      type: object
      description: >-
        HTTP headers map forwarded as-is from CDP without normalization. Values
        are typically strings but may be any JSON type.
      additionalProperties: true
    BrowserTargetType:
      type: string
      description: CDP target type of the page that produced the event.
      enum:
        - page
        - background_page
        - service_worker
        - shared_worker
        - other
    BrowserEventContext:
      type: object
      description: >-
        Browser event context stamped by the browser monitor onto all
        CDP-sourced events. Identifies the target, frame, and navigation epoch
        in which the event occurred.
      properties:
        session_id:
          type: string
          description: CDP session identifier for the target connection.
        target_id:
          type: string
          description: Browser target identifier (stable across navigations within a tab).
        target_type:
          $ref: '#/components/schemas/BrowserTargetType'
        frame_id:
          type: string
          description: CDP frame identifier within the target.
        loader_id:
          type: string
          description: CDP document loader identifier, reset on each navigation.
        url:
          type: string
          description: >-
            URL relevant to this event — page URL for navigation and page
            events, request URL for network events.
        nav_seq:
          type: integer
          format: int64
          description: >-
            Monotonically increasing navigation sequence number, incremented on
            each top-level navigation within the target.
    BrowserConsoleLogEvent:
      type: object
      description: >-
        A browser console log event (console.log, console.info, console.warn,
        etc.).
      required:
        - ts
        - type
        - source
      properties:
        ts:
          type: integer
          format: int64
          description: Event timestamp in Unix microseconds.
        type:
          type: string
          const: console_log
        source:
          $ref: '#/components/schemas/BrowserEventSource'
        data:
          allOf:
            - $ref: '#/components/schemas/BrowserEventContext'
            - type: object
              properties:
                level:
                  type: string
                  description: >-
                    CDP Runtime.consoleAPICalled type, passed through unfiltered
                    from Chrome. error is routed to console_error events
                    instead; all other CDP console types appear here. See CDP
                    spec for the full enum.
                text:
                  type: string
                  description: First console argument coerced to string.
                args:
                  type: array
                  description: All console arguments coerced to strings.
                  items:
                    type: string
                stack_trace:
                  $ref: '#/components/schemas/BrowserCallStack'
        truncated:
          type: boolean
          description: True if the data field was truncated due to size limits.
    BrowserConsoleErrorEvent:
      type: object
      description: >
        A browser console error or uncaught JavaScript exception event. Emitted
        from two distinct CDP sources with different data shapes.
        Runtime.consoleAPICalled (console.error calls) produces level, text,
        args, and stack_trace. Runtime.exceptionThrown (uncaught exceptions)
        produces text, line, column, source_url, and stack_trace. Fields not
        applicable to the source are absent.
      required:
        - ts
        - type
        - source
      properties:
        ts:
          type: integer
          format: int64
          description: Event timestamp in Unix microseconds.
        type:
          type: string
          const: console_error
        source:
          $ref: '#/components/schemas/BrowserEventSource'
        data:
          allOf:
            - $ref: '#/components/schemas/BrowserEventContext'
            - type: object
              required:
                - text
              properties:
                text:
                  type: string
                  description: Error message text. Present in both source paths.
                stack_trace:
                  $ref: '#/components/schemas/BrowserCallStack'
                level:
                  type: string
                  description: >-
                    CDP console type value, always "error". Present only when
                    sourced from Runtime.consoleAPICalled.
                args:
                  type: array
                  description: >-
                    All console arguments coerced to strings. Present only when
                    sourced from Runtime.consoleAPICalled.
                  items:
                    type: string
                line:
                  type: integer
                  description: >-
                    Line number in the script where the exception was thrown.
                    Present only when sourced from Runtime.exceptionThrown.
                column:
                  type: integer
                  description: >-
                    Column number in the script where the exception was thrown.
                    Present only when sourced from Runtime.exceptionThrown.
                source_url:
                  type: string
                  description: >-
                    URL of the script file that threw the exception. Present
                    only when sourced from Runtime.exceptionThrown.
        truncated:
          type: boolean
          description: True if the data field was truncated due to size limits.
    BrowserNetworkRequestEvent:
      type: object
      description: A browser network request sent event.
      required:
        - ts
        - type
        - source
      properties:
        ts:
          type: integer
          format: int64
          description: Event timestamp in Unix microseconds.
        type:
          type: string
          const: network_request
        source:
          $ref: '#/components/schemas/BrowserEventSource'
        data:
          allOf:
            - $ref: '#/components/schemas/BrowserEventContext'
            - type: object
              properties:
                request_id:
                  type: string
                  description: CDP request identifier, unique within the session.
                method:
                  type: string
                  description: HTTP method as sent on the wire (e.g. GET, POST).
                document_url:
                  type: string
                  description: URL of the document that initiated the request.
                headers:
                  $ref: '#/components/schemas/BrowserHttpHeaders'
                  description: Request headers.
                resource_type:
                  type: string
                  description: >-
                    CDP Network.ResourceType for the request, passed through
                    as-is from Chrome. Known values include Document, Fetch,
                    XHR, Script, Stylesheet, Image, Media, Font, TextTrack,
                    EventSource, WebSocket, Manifest, Prefetch, Other, and more.
                initiator_type:
                  type: string
                  description: >-
                    CDP Initiator.type indicating what caused the request,
                    passed through as-is from Chrome. Known values include
                    script, parser, preload, and other.
                post_data:
                  type: string
                  description: Request body for POST/PUT requests, if available.
                is_redirect:
                  type: boolean
                  description: True if this request is the result of a redirect.
                redirect_url:
                  type: string
                  description: >-
                    Original URL before the redirect, present when is_redirect
                    is true.
        truncated:
          type: boolean
          description: True if the data field was truncated due to size limits.
    BrowserNetworkResponseEvent:
      type: object
      description: >-
        A browser network response received event. Fired after the response body
        is fully received, not when headers arrive.
      required:
        - ts
        - type
        - source
      properties:
        ts:
          type: integer
          format: int64
          description: Event timestamp in Unix microseconds.
        type:
          type: string
          const: network_response
        source:
          $ref: '#/components/schemas/BrowserEventSource'
        data:
          allOf:
            - $ref: '#/components/schemas/BrowserEventContext'
            - type: object
              properties:
                request_id:
                  type: string
                  description: >-
                    CDP request identifier matching the originating
                    network_request event.
                method:
                  type: string
                  description: HTTP method of the original request.
                status:
                  type: integer
                  description: HTTP response status code.
                status_text:
                  type: string
                  description: HTTP response status text (e.g. OK, Not Found).
                headers:
                  $ref: '#/components/schemas/BrowserHttpHeaders'
                  description: Response headers.
                mime_type:
                  type: string
                  description: >-
                    MIME type of the response (e.g. text/html,
                    application/json).
                resource_type:
                  type: string
                  description: >-
                    CDP Network.ResourceType for the request, passed through
                    as-is from Chrome. Known values include Document, Fetch,
                    XHR, Script, Stylesheet, Image, Media, Font, TextTrack,
                    EventSource, WebSocket, Manifest, Prefetch, Other, and more.
                body:
                  type: string
                  description: Truncated response body, present only for text MIME types.
        truncated:
          type: boolean
          description: True if the data field was truncated due to size limits.
    BrowserNetworkLoadingFailedEvent:
      type: object
      description: >-
        A browser network loading failed event. If the request was already in
        flight when CDP attached (no prior network_request was emitted for it),
        url, frame_id, loader_id, and resource_type are absent;
        BrowserEventContext is partially populated in that case.
      required:
        - ts
        - type
        - source
      properties:
        ts:
          type: integer
          format: int64
          description: Event timestamp in Unix microseconds.
        type:
          type: string
          const: network_loading_failed
        source:
          $ref: '#/components/schemas/BrowserEventSource'
        data:
          allOf:
            - $ref: '#/components/schemas/BrowserEventContext'
            - type: object
              properties:
                request_id:
                  type: string
                  description: >-
                    CDP request identifier matching the originating
                    network_request event.
                error_text:
                  type: string
                  description: >-
                    Network error description (e.g.
                    net::ERR_CONNECTION_REFUSED).
                canceled:
                  type: boolean
                  description: >-
                    True if the request was canceled by the browser or page
                    script.
                resource_type:
                  type: string
                  description: >-
                    CDP Network.ResourceType for the request, passed through
                    as-is from Chrome. Known values include Document, Fetch,
                    XHR, Script, Stylesheet, Image, Media, Font, TextTrack,
                    EventSource, WebSocket, Manifest, Prefetch, Other, and more.
        truncated:
          type: boolean
          description: True if the data field was truncated due to size limits.
    BrowserNetworkIdleEvent:
      type: object
      description: >-
        A browser network idle event emitted after a 500ms quiet period with no
        in-flight HTTP requests.
      required:
        - ts
        - type
        - source
      properties:
        ts:
          type: integer
          format: int64
          description: Event timestamp in Unix microseconds.
        type:
          type: string
          const: network_idle
        source:
          $ref: '#/components/schemas/BrowserEventSource'
        data:
          $ref: '#/components/schemas/BrowserEventContext'
        truncated:
          type: boolean
          description: True if the data field was truncated due to size limits.
    BrowserPageNavigationEvent:
      type: object
      description: >-
        A browser page navigation started event (CDP Page.frameNavigated).
        Carries nav context fields inline but not nav_seq, as this event resets
        the navigation epoch.
      required:
        - ts
        - type
        - source
      properties:
        ts:
          type: integer
          format: int64
          description: Event timestamp in Unix microseconds.
        type:
          type: string
          const: page_navigation
        source:
          $ref: '#/components/schemas/BrowserEventSource'
        data:
          type: object
          additionalProperties: false
          properties:
            url:
              type: string
              description: URL navigated to.
            frame_id:
              type: string
              description: CDP frame identifier of the navigated frame.
            parent_frame_id:
              type: string
              description: >-
                Parent frame identifier for subframe navigations; absent for
                top-level navigations.
            loader_id:
              type: string
              description: New CDP document loader identifier assigned for this navigation.
            session_id:
              type: string
              description: CDP session identifier.
            target_id:
              type: string
              description: Browser target identifier.
            target_type:
              $ref: '#/components/schemas/BrowserTargetType'
        truncated:
          type: boolean
          description: True if the data field was truncated due to size limits.
    BrowserPageDomContentLoadedEvent:
      type: object
      description: A browser DOMContentLoaded event (CDP Page.domContentEventFired).
      required:
        - ts
        - type
        - source
      properties:
        ts:
          type: integer
          format: int64
          description: Event timestamp in Unix microseconds.
        type:
          type: string
          const: page_dom_content_loaded
        source:
          $ref: '#/components/schemas/BrowserEventSource'
        data:
          allOf:
            - $ref: '#/components/schemas/BrowserEventContext'
            - type: object
              properties:
                cdp_timestamp:
                  type: number
                  description: >-
                    Chrome monotonic clock value in seconds at which
                    DOMContentLoaded fired, relative to browser process start
                    (not Unix epoch). Use ts for wall-clock time.
        truncated:
          type: boolean
          description: True if the data field was truncated due to size limits.
    BrowserPageLoadEvent:
      type: object
      description: A browser page load event (CDP Page.loadEventFired).
      required:
        - ts
        - type
        - source
      properties:
        ts:
          type: integer
          format: int64
          description: Event timestamp in Unix microseconds.
        type:
          type: string
          const: page_load
        source:
          $ref: '#/components/schemas/BrowserEventSource'
        data:
          allOf:
            - $ref: '#/components/schemas/BrowserEventContext'
            - type: object
              properties:
                cdp_timestamp:
                  type: number
                  description: >-
                    Chrome monotonic clock value in seconds at which the load
                    event fired, relative to browser process start (not Unix
                    epoch). Use ts for wall-clock time.
        truncated:
          type: boolean
          description: True if the data field was truncated due to size limits.
    BrowserPageTabOpenedEvent:
      type: object
      description: >-
        A new browser tab or target was opened (CDP Target.attachedToTarget for
        page targets). Fires before a CDP session is attached to the new target,
        so session_id, frame_id, loader_id, and nav_seq are absent; this event
        does not compose BrowserEventContext. Consumers reading context fields
        generically should treat it as a special case.
      required:
        - ts
        - type
        - source
      properties:
        ts:
          type: integer
          format: int64
          description: Event timestamp in Unix microseconds.
        type:
          type: string
          const: page_tab_opened
        source:
          $ref: '#/components/schemas/BrowserEventSource'
        data:
          type: object
          additionalProperties: false
          properties:
            target_id:
              type: string
              description: CDP target identifier for the newly opened tab.
            target_type:
              $ref: '#/components/schemas/BrowserTargetType'
            url:
              type: string
              description: Initial URL of the new tab.
            title:
              type: string
              description: Initial page title of the new tab.
            opener_id:
              type: string
              description: Target identifier of the tab that opened this one, if any.
        truncated:
          type: boolean
          description: True if the data field was truncated due to size limits.
    BrowserPageLayoutShiftEvent:
      type: object
      description: >-
        A browser cumulative layout shift (CLS) event from the Performance
        Timeline API.
      required:
        - ts
        - type
        - source
      properties:
        ts:
          type: integer
          format: int64
          description: Event timestamp in Unix microseconds.
        type:
          type: string
          const: page_layout_shift
        source:
          $ref: '#/components/schemas/BrowserEventSource'
        data:
          allOf:
            - $ref: '#/components/schemas/BrowserEventContext'
            - type: object
              properties:
                source_frame_id:
                  type: string
                  description: >-
                    CDP frame identifier of the frame where the layout shift
                    occurred.
                time:
                  type: number
                  description: >-
                    Performance Timeline timestamp of the layout shift in
                    milliseconds.
                duration:
                  type: number
                  description: >-
                    Duration of the layout shift entry in milliseconds (always 0
                    for layout shifts per spec).
                layout_shift_details:
                  type: object
                  additionalProperties: false
                  description: >-
                    PerformanceLayoutShift attributes from the Performance
                    Timeline entry.
                  properties:
                    value:
                      type: number
                      description: Layout shift score for this entry (contribution to CLS).
                    had_recent_input:
                      type: boolean
                      description: >-
                        True if the layout shift was preceded by user input
                        within 500ms, excluding it from CLS.
        truncated:
          type: boolean
          description: True if the data field was truncated due to size limits.
    BrowserPageLcpEvent:
      type: object
      description: >-
        A browser Largest Contentful Paint (LCP) event from the Performance
        Timeline API.
      required:
        - ts
        - type
        - source
      properties:
        ts:
          type: integer
          format: int64
          description: Event timestamp in Unix microseconds.
        type:
          type: string
          const: page_lcp
        source:
          $ref: '#/components/schemas/BrowserEventSource'
        data:
          allOf:
            - $ref: '#/components/schemas/BrowserEventContext'
            - type: object
              properties:
                source_frame_id:
                  type: string
                  description: >-
                    CDP frame identifier of the frame where the LCP element was
                    rendered.
                time:
                  type: number
                  description: >-
                    Performance Timeline timestamp of the LCP entry in
                    milliseconds.
                lcp_details:
                  type: object
                  additionalProperties: false
                  description: >-
                    LargestContentfulPaint attributes from the Performance
                    Timeline entry.
                  properties:
                    render_time:
                      type: number
                      description: >-
                        Render time of the LCP element in milliseconds; 0 for
                        cross-origin images without Timing-Allow-Origin.
                    load_time:
                      type: number
                      description: Load time of the LCP element in milliseconds.
                    size:
                      type: number
                      description: Visible area of the LCP element in pixels squared.
                    element_id:
                      type: string
                      description: id attribute of the LCP element, if present.
                    url:
                      type: string
                      description: URL of the LCP element for image or video elements.
                    node_id:
                      type: integer
                      description: CDP DOM node identifier of the LCP element.
        truncated:
          type: boolean
          description: True if the data field was truncated due to size limits.
    BrowserPageLayoutSettledEvent:
      type: object
      description: >-
        A browser layout settled event emitted 1 second after page load with no
        intervening layout shifts, indicating visual stability. Each layout
        shift resets the 1-second timer.
      required:
        - ts
        - type
        - source
      properties:
        ts:
          type: integer
          format: int64
          description: Event timestamp in Unix microseconds.
        type:
          type: string
          const: page_layout_settled
        source:
          $ref: '#/components/schemas/BrowserEventSource'
        data:
          $ref: '#/components/schemas/BrowserEventContext'
        truncated:
          type: boolean
          description: True if the data field was truncated due to size limits.
    BrowserPageNavigationSettledEvent:
      type: object
      description: >-
        Emitted when page_dom_content_loaded and page_layout_settled have both
        fired for the same navigation, indicating the page is loaded and
        visually stable. Independent of network_idle; a single pending request
        does not block it.
      required:
        - ts
        - type
        - source
      properties:
        ts:
          type: integer
          format: int64
          description: Event timestamp in Unix microseconds.
        type:
          type: string
          const: page_navigation_settled
        source:
          $ref: '#/components/schemas/BrowserEventSource'
        data:
          $ref: '#/components/schemas/BrowserEventContext'
        truncated:
          type: boolean
          description: True if the data field was truncated due to size limits.
    BrowserInteractionClickEvent:
      type: object
      description: A browser user click event captured via injected page script.
      required:
        - ts
        - type
        - source
      properties:
        ts:
          type: integer
          format: int64
          description: Event timestamp in Unix microseconds.
        type:
          type: string
          const: interaction_click
        source:
          $ref: '#/components/schemas/BrowserEventSource'
        data:
          allOf:
            - $ref: '#/components/schemas/BrowserEventContext'
            - type: object
              properties:
                x:
                  type: integer
                  description: Viewport x-coordinate of the click in CSS pixels.
                'y':
                  type: integer
                  description: Viewport y-coordinate of the click in CSS pixels.
                selector:
                  type: string
                  description: CSS selector path to the clicked element.
                tag:
                  type: string
                  description: >-
                    HTML tag name of the clicked element in uppercase (e.g.
                    BUTTON, A, DIV).
                text:
                  type: string
                  description: Visible text content of the clicked element, trimmed.
        truncated:
          type: boolean
          description: True if the data field was truncated due to size limits.
    BrowserInteractionKeyEvent:
      type: object
      description: A browser keyboard event captured via injected page script.
      required:
        - ts
        - type
        - source
      properties:
        ts:
          type: integer
          format: int64
          description: Event timestamp in Unix microseconds.
        type:
          type: string
          const: interaction_key
        source:
          $ref: '#/components/schemas/BrowserEventSource'
        data:
          allOf:
            - $ref: '#/components/schemas/BrowserEventContext'
            - type: object
              properties:
                key:
                  type: string
                  description: Key value from the KeyboardEvent (e.g. Enter, Backspace, a).
                selector:
                  type: string
                  description: >-
                    CSS selector path to the element that had focus when the key
                    was pressed.
                tag:
                  type: string
                  description: >-
                    HTML tag name of the focused element in uppercase (e.g.
                    INPUT, TEXTAREA, DIV).
        truncated:
          type: boolean
          description: True if the data field was truncated due to size limits.
    BrowserInteractionScrollSettledEvent:
      type: object
      description: >-
        A browser scroll settled event emitted after scroll position stops
        changing, captured via injected page script.
      required:
        - ts
        - type
        - source
      properties:
        ts:
          type: integer
          format: int64
          description: Event timestamp in Unix microseconds.
        type:
          type: string
          const: interaction_scroll_settled
        source:
          $ref: '#/components/schemas/BrowserEventSource'
        data:
          allOf:
            - $ref: '#/components/schemas/BrowserEventContext'
            - type: object
              properties:
                from_x:
                  type: integer
                  description: >-
                    Scroll x-position at the start of the scroll gesture in CSS
                    pixels.
                from_y:
                  type: integer
                  description: >-
                    Scroll y-position at the start of the scroll gesture in CSS
                    pixels.
                to_x:
                  type: integer
                  description: >-
                    Final scroll x-position after the gesture settled in CSS
                    pixels.
                to_y:
                  type: integer
                  description: >-
                    Final scroll y-position after the gesture settled in CSS
                    pixels.
                target_selector:
                  type: string
                  description: CSS selector path to the scrolled element.
        truncated:
          type: boolean
          description: True if the data field was truncated due to size limits.
    BrowserMonitorScreenshotEvent:
      type: object
      description: A periodic screenshot of the browser viewport.
      required:
        - ts
        - type
        - source
      properties:
        ts:
          type: integer
          format: int64
          description: Event timestamp in Unix microseconds.
        type:
          type: string
          const: monitor_screenshot
        source:
          $ref: '#/components/schemas/BrowserEventSource'
        data:
          type: object
          additionalProperties: false
          properties:
            png:
              type: string
              contentEncoding: base64
              description: Base64-encoded PNG screenshot of the browser viewport.
        truncated:
          type: boolean
          description: True if the data field was truncated due to size limits.
    BrowserMonitorDisconnectedEvent:
      type: object
      description: >-
        The CDP connection to Chrome was lost. Telemetry events may be dropped
        until monitor_reconnected arrives. Treat any in-progress computed state
        (network_idle, page_layout_settled) as unreliable until then.
      required:
        - ts
        - type
        - source
      properties:
        ts:
          type: integer
          format: int64
          description: Event timestamp in Unix microseconds.
        type:
          type: string
          const: monitor_disconnected
        source:
          $ref: '#/components/schemas/BrowserEventSource'
        data:
          type: object
          additionalProperties: false
          properties:
            reason:
              type: string
              description: >-
                Reason for the disconnection. chrome_restarted: Chrome process
                restarted.
              enum:
                - chrome_restarted
        truncated:
          type: boolean
          description: True if the data field was truncated due to size limits.
    BrowserMonitorReconnectedEvent:
      type: object
      description: >-
        The CDP connection to Chrome was successfully re-established after a
        disconnection. Events emitted during the gap are lost. Computed state is
        reset, so navigation and network tracking restart fresh from this point.
      required:
        - ts
        - type
        - source
      properties:
        ts:
          type: integer
          format: int64
          description: Event timestamp in Unix microseconds.
        type:
          type: string
          const: monitor_reconnected
        source:
          $ref: '#/components/schemas/BrowserEventSource'
        data:
          type: object
          additionalProperties: false
          properties:
            reconnect_duration_ms:
              type: integer
              format: int64
              description: >-
                Wall-clock time in milliseconds taken to reconnect after the
                disconnection.
        truncated:
          type: boolean
          description: True if the data field was truncated due to size limits.
    BrowserMonitorReconnectFailedEvent:
      type: object
      description: >-
        The CDP connection to Chrome could not be re-established after
        exhausting all reconnection attempts. No further telemetry events will
        arrive on this session.
      required:
        - ts
        - type
        - source
      properties:
        ts:
          type: integer
          format: int64
          description: Event timestamp in Unix microseconds.
        type:
          type: string
          const: monitor_reconnect_failed
        source:
          $ref: '#/components/schemas/BrowserEventSource'
        data:
          type: object
          additionalProperties: false
          properties:
            reason:
              type: string
              description: >-
                Reason for the reconnection failure. reconnect_exhausted: all
                retry attempts were used up without successfully restoring the
                CDP connection.
              enum:
                - reconnect_exhausted
        truncated:
          type: boolean
          description: True if the data field was truncated due to size limits.
    BrowserMonitorInitFailedEvent:
      type: object
      description: The CDP session could not be initialized.
      required:
        - ts
        - type
        - source
      properties:
        ts:
          type: integer
          format: int64
          description: Event timestamp in Unix microseconds.
        type:
          type: string
          const: monitor_init_failed
        source:
          $ref: '#/components/schemas/BrowserEventSource'
        data:
          type: object
          additionalProperties: false
          properties:
            step:
              type: string
              description: >-
                The CDP method or initialization step that failed (e.g.
                Target.setAutoAttach).
        truncated:
          type: boolean
          description: True if the data field was truncated due to size limits.
    BrowserTelemetryEvent:
      oneOf:
        - $ref: '#/components/schemas/BrowserConsoleLogEvent'
        - $ref: '#/components/schemas/BrowserConsoleErrorEvent'
        - $ref: '#/components/schemas/BrowserNetworkRequestEvent'
        - $ref: '#/components/schemas/BrowserNetworkResponseEvent'
        - $ref: '#/components/schemas/BrowserNetworkLoadingFailedEvent'
        - $ref: '#/components/schemas/BrowserNetworkIdleEvent'
        - $ref: '#/components/schemas/BrowserPageNavigationEvent'
        - $ref: '#/components/schemas/BrowserPageDomContentLoadedEvent'
        - $ref: '#/components/schemas/BrowserPageLoadEvent'
        - $ref: '#/components/schemas/BrowserPageTabOpenedEvent'
        - $ref: '#/components/schemas/BrowserPageLayoutShiftEvent'
        - $ref: '#/components/schemas/BrowserPageLcpEvent'
        - $ref: '#/components/schemas/BrowserPageLayoutSettledEvent'
        - $ref: '#/components/schemas/BrowserPageNavigationSettledEvent'
        - $ref: '#/components/schemas/BrowserInteractionClickEvent'
        - $ref: '#/components/schemas/BrowserInteractionKeyEvent'
        - $ref: '#/components/schemas/BrowserInteractionScrollSettledEvent'
        - $ref: '#/components/schemas/BrowserMonitorScreenshotEvent'
        - $ref: '#/components/schemas/BrowserMonitorDisconnectedEvent'
        - $ref: '#/components/schemas/BrowserMonitorReconnectedEvent'
        - $ref: '#/components/schemas/BrowserMonitorReconnectFailedEvent'
        - $ref: '#/components/schemas/BrowserMonitorInitFailedEvent'
      discriminator:
        propertyName: type
        mapping:
          console_log: '#/components/schemas/BrowserConsoleLogEvent'
          console_error: '#/components/schemas/BrowserConsoleErrorEvent'
          network_request: '#/components/schemas/BrowserNetworkRequestEvent'
          network_response: '#/components/schemas/BrowserNetworkResponseEvent'
          network_loading_failed: '#/components/schemas/BrowserNetworkLoadingFailedEvent'
          network_idle: '#/components/schemas/BrowserNetworkIdleEvent'
          page_navigation: '#/components/schemas/BrowserPageNavigationEvent'
          page_dom_content_loaded: '#/components/schemas/BrowserPageDomContentLoadedEvent'
          page_load: '#/components/schemas/BrowserPageLoadEvent'
          page_tab_opened: '#/components/schemas/BrowserPageTabOpenedEvent'
          page_layout_shift: '#/components/schemas/BrowserPageLayoutShiftEvent'
          page_lcp: '#/components/schemas/BrowserPageLcpEvent'
          page_layout_settled: '#/components/schemas/BrowserPageLayoutSettledEvent'
          page_navigation_settled: '#/components/schemas/BrowserPageNavigationSettledEvent'
          interaction_click: '#/components/schemas/BrowserInteractionClickEvent'
          interaction_key: '#/components/schemas/BrowserInteractionKeyEvent'
          interaction_scroll_settled: '#/components/schemas/BrowserInteractionScrollSettledEvent'
          monitor_screenshot: '#/components/schemas/BrowserMonitorScreenshotEvent'
          monitor_disconnected: '#/components/schemas/BrowserMonitorDisconnectedEvent'
          monitor_reconnected: '#/components/schemas/BrowserMonitorReconnectedEvent'
          monitor_reconnect_failed: '#/components/schemas/BrowserMonitorReconnectFailedEvent'
          monitor_init_failed: '#/components/schemas/BrowserMonitorInitFailedEvent'
      description: >
        Union type representing any browser telemetry event. Discriminated on
        `type`. Events with a `monitor_` prefix (monitor_screenshot,
        monitor_disconnected, monitor_reconnected, monitor_reconnect_failed,
        monitor_init_failed) are always emitted regardless of the category
        configuration in BrowserTelemetryConfig. All other event types are
        controlled by the per-category enable/disable flags.
    BrowserTelemetryEventEnvelope:
      type: object
      description: >
        Envelope wrapping a browser telemetry event with its monotonic sequence
        number. Each SSE data: frame carries one envelope as JSON. The seq value
        is also emitted as the SSE id: field so clients can pass it as
        Last-Event-ID on reconnect.
      required:
        - seq
        - event
      properties:
        seq:
          type: integer
          format: int64
          minimum: 1
          description: >
            Process-monotonic sequence number assigned by the browser VM. Pass
            as Last-Event-ID on reconnect to resume without gaps. Gaps in
            received seq values indicate dropped events.
        event:
          $ref: '#/components/schemas/BrowserTelemetryEvent'
      additionalProperties: false
    Profile:
      type: object
      description: Browser profile metadata.
      properties:
        id:
          type: string
          description: Unique identifier for the profile
        name:
          type: string
          nullable: true
          description: Optional, easier-to-reference name for the profile
        created_at:
          type: string
          format: date-time
          description: Timestamp when the profile was created
        updated_at:
          type: string
          format: date-time
          description: Timestamp when the profile was last updated
        last_used_at:
          type: string
          format: date-time
          description: Timestamp when the profile was last used
      required:
        - id
        - created_at
    ProfileRequest:
      type: object
      description: Request body for creating a profile.
      properties:
        name:
          type: string
          description: Optional name of the profile. Must be unique within the project.
      required: []
    BrowserProfile:
      type: object
      description: >
        Profile selection for the browser session. Provide either id or name. If
        specified, the

        matching profile will be loaded into the browser session. Profiles must
        be created beforehand.
      properties:
        id:
          type: string
          description: Profile ID to load for this browser session
        name:
          type: string
          minLength: 1
          maxLength: 255
          pattern: ^[a-zA-Z0-9._-]{1,255}$
          description: >-
            Profile name to load for this browser session (instead of id). Must
            be 1-255 characters, using letters, numbers, dots, underscores, or
            hyphens.
        save_changes:
          type: boolean
          description: >-
            If true, save changes made during the session back to the profile
            when the session ends.
          default: false
      oneOf:
        - required:
            - id
        - required:
            - name
    ProxyRef:
      type: object
      description: >
        Proxy selection. Provide either id or name. The proxy must belong to the
        caller's org.
      properties:
        id:
          type: string
          description: Proxy ID
        name:
          type: string
          description: Proxy name
      oneOf:
        - required:
            - id
        - required:
            - name
    BrowserViewport:
      type: object
      description: >
        Initial browser window size in pixels with optional refresh rate.

        If omitted, image defaults apply (1920x1080@25).

        For GPU images, the default is 1920x1080@60.

        Arbitrary viewport dimensions and refresh rates are accepted.

        Known-good presets include:

        2560x1440@10, 1920x1080@25, 1920x1200@25, 1440x900@25, 1280x800@60,
        1024x768@60, 1200x800@60.

        For GPU images, recommended presets use one of these resolutions with
        refresh rates 60, 30, 25, or 10:

        800x600, 960x720, 1024x576, 1024x768, 1152x648, 1200x800, 1280x720,
        1368x768, 1440x900, 1600x900, 1920x1080, 1920x1200, 390x844, 360x250,
        768x1024, 800x1600.

        Viewports outside this list may exhibit unstable live view or recording
        behavior.

        If refresh_rate is not provided, it will be automatically determined
        based on the resolution

        (higher resolutions use lower refresh rates to keep bandwidth
        reasonable).
      properties:
        width:
          type: integer
          description: Browser window width in pixels.
          minimum: 320
          maximum: 7680
          example: 1280
        height:
          type: integer
          description: Browser window height in pixels.
          minimum: 240
          maximum: 4320
          example: 800
        refresh_rate:
          type: integer
          description: >-
            Display refresh rate in Hz. If omitted, automatically determined
            from width and height.
          example: 60
      required:
        - width
        - height
    BrowserViewportUpdate:
      description: >-
        Viewport configuration for updating a browser session. Extends
        BrowserViewport with update-only options.
      allOf:
        - $ref: '#/components/schemas/BrowserViewport'
        - type: object
          properties:
            force:
              type: boolean
              default: false
              description: >
                If true, allow the viewport change even when a live view or
                recording/replay is active.

                Active recordings will be gracefully stopped and restarted at
                the new resolution as

                separate segments. If false (default), the resize is refused
                when a live view or recording is active.
    Extension:
      type: object
      description: A browser extension uploaded to Kernel.
      properties:
        id:
          type: string
          description: Unique identifier for the extension
        name:
          type: string
          nullable: true
          description: >-
            Optional, easier-to-reference name for the extension. Must be unique
            within the project.
        created_at:
          type: string
          format: date-time
          description: Timestamp when the extension was created
        size_bytes:
          type: integer
          description: Size of the extension archive in bytes
        last_used_at:
          type: string
          format: date-time
          nullable: true
          description: Timestamp when the extension was last used
      required:
        - id
        - created_at
        - size_bytes
    BrowserExtension:
      type: object
      description: >
        Extension selection for the browser session. Provide either id or name
        of an extension uploaded to Kernel.
      properties:
        id:
          type: string
          description: Extension ID to load for this browser session
        name:
          type: string
          minLength: 1
          maxLength: 255
          pattern: ^[a-zA-Z0-9._-]{1,255}$
          description: >-
            Extension name to load for this browser session (instead of id).
            Must be 1-255 characters, using letters, numbers, dots, underscores,
            or hyphens.
      oneOf:
        - required:
            - id
        - required:
            - name
    BrowserPoolRequest:
      type: object
      description: >
        Parameters for creating a browser pool. All browsers in the pool will be
        created with the same configuration.
      properties:
        name:
          type: string
          pattern: ^[a-zA-Z0-9._-]{1,255}$
          description: >-
            Optional name for the browser pool. Must be unique within the
            project.
          example: my-pool
        size:
          type: integer
          description: >
            Number of browsers to maintain in the pool. The maximum size is
            determined by your

            organization's pooled sessions limit (the sum of all pool sizes
            cannot exceed your limit).
          minimum: 1
          example: 10
        fill_rate_per_minute:
          type: integer
          description: Percentage of the pool to fill per minute. Defaults to 10%.
          minimum: 0
          maximum: 25
          default: 10
        timeout_seconds:
          type: integer
          description: >-
            Default idle timeout in seconds for browsers acquired from this pool
            before they are destroyed. Defaults to 600 seconds if not specified
          minimum: 60
          maximum: 86400
          default: 600
        stealth:
          type: boolean
          description: >-
            If true, launches the browser in stealth mode to reduce detection by
            anti-bot mechanisms.
          example: true
        headless:
          type: boolean
          description: >-
            If true, launches the browser using a headless image. Defaults to
            false.
          example: false
        profile:
          $ref: '#/components/schemas/BrowserProfile'
        extensions:
          type: array
          description: >-
            List of browser extensions to load into the session. Provide each by
            id or name.
          maxItems: 20
          items:
            $ref: '#/components/schemas/BrowserExtension'
        proxy_id:
          type: string
          description: >-
            Optional proxy to associate to the browser session. Must reference a
            proxy belonging to the caller's org.
        viewport:
          $ref: '#/components/schemas/BrowserViewport'
        kiosk_mode:
          type: boolean
          description: >-
            If true, launches the browser in kiosk mode to hide address bar and
            tabs in live view.
          example: true
        chrome_policy:
          type: object
          additionalProperties: true
          description: >
            Custom Chrome enterprise policy overrides applied to all browsers in
            this pool. Keys are Chrome enterprise policy names; values must
            match their expected types. Blocked: kernel-managed policies
            (extensions, proxy, CDP/automation). See
            https://chromeenterprise.google/policies/
        start_url:
          type: string
          description: >-
            Optional URL to navigate to when a new browser is warmed into the
            pool. Best-effort: failures to navigate do not fail pool fill. Only
            applied to newly-warmed browsers; browsers reused via
            release/acquire keep whatever URL the previous lease left them on.
            Accepts any URL Chromium can resolve, including chrome:// pages.
          example: https://example.com
      required:
        - size
    BrowserPoolUpdateRequest:
      type: object
      description: >
        Parameters for updating a browser pool. All browsers in the pool will be
        created with the same configuration.
      allOf:
        - $ref: '#/components/schemas/BrowserPoolRequest'
        - type: object
          properties:
            discard_all_idle:
              type: boolean
              description: >-
                Whether to discard all idle browsers and rebuild the pool
                immediately. Defaults to false.
              example: false
              default: false
    BrowserPoolDeleteRequest:
      type: object
      description: |
        Parameters for deleting a browser pool.
      properties:
        force:
          type: boolean
          default: false
          description: >-
            If true, force delete even if browsers are currently leased. Leased
            browsers will be terminated.
      required: []
    BrowserPool:
      type: object
      description: A browser pool containing multiple identically configured browsers.
      properties:
        id:
          type: string
          description: Unique identifier for the browser pool
          example: iv25ujqf37x3j07dwoffegqr
        name:
          type: string
          description: Browser pool name, if set
          example: my-pool
        available_count:
          type: integer
          description: Number of browsers currently available in the pool
          example: 85
        acquired_count:
          type: integer
          description: Number of browsers currently acquired from the pool
          example: 15
        created_at:
          type: string
          format: date-time
          description: Timestamp when the browser pool was created
        browser_pool_config:
          $ref: '#/components/schemas/BrowserPoolRequest'
          description: Configuration used to create all browsers in this pool
      required:
        - id
        - available_count
        - acquired_count
        - created_at
        - browser_pool_config
    BrowserPoolAcquireRequest:
      type: object
      description: Request body for acquiring a browser from the pool.
      properties:
        acquire_timeout_seconds:
          type: integer
          description: >-
            Maximum number of seconds to wait for a browser to be available.
            Defaults to the calculated time it would take to fill the pool at
            the currently configured fill rate.
      required: []
    BrowserPoolReleaseRequest:
      type: object
      description: Request body for releasing a browser back to the pool.
      properties:
        session_id:
          type: string
          description: Browser session ID to release back to the pool
          example: ts8iy3sg25ibheguyni2lg9t
        reuse:
          type: boolean
          description: >-
            Whether to reuse the browser instance or destroy it and create a new
            one. Defaults to true.
          default: true
          example: false
      required:
        - session_id
    LogEvent:
      type: object
      description: A log entry from the application.
      required:
        - event
        - message
        - timestamp
      properties:
        event:
          type: string
          const: log
          description: Event type identifier (always "log").
        timestamp:
          type: string
          format: date-time
          description: Time the log entry was produced.
        message:
          type: string
          description: Log message text.
    AppVersionSummaryEvent:
      type: object
      description: Summary of an application version.
      required:
        - event
        - timestamp
        - id
        - app_name
        - version
        - region
        - actions
      properties:
        event:
          type: string
          const: app_version_summary
          description: Event type identifier (always "app_version_summary").
        timestamp:
          type: string
          format: date-time
          description: Time the state was reported.
        id:
          type: string
          description: Unique identifier for the app version
          example: rr33xuugxj9h0bkf1rdt2bet
        app_name:
          type: string
          description: Name of the application
          example: my-app
        version:
          type: string
          description: Version label for the application
          example: 1.0.0
        region:
          type: string
          description: Deployment region code
          example: aws.us-east-1a
          const: aws.us-east-1a
        actions:
          type: array
          description: List of actions available on the app
          items:
            $ref: '#/components/schemas/AppAction'
        env_vars:
          type: object
          description: Environment variables configured for this app version
          additionalProperties:
            type: string
    AppAction:
      type: object
      description: An action available on the app
      required:
        - name
      properties:
        name:
          type: string
          description: Name of the action
          example: analyze
        input_schema:
          type: object
          nullable: true
          description: >-
            JSON Schema (draft-07) describing the expected input payload. Null
            if schema could not be automatically generated.
          additionalProperties: true
        output_schema:
          type: object
          nullable: true
          description: >-
            JSON Schema (draft-07) describing the expected output payload. Null
            if schema could not be automatically generated.
          additionalProperties: true
    ErrorEvent:
      type: object
      description: An error event from the application.
      required:
        - event
        - timestamp
        - error
      properties:
        event:
          type: string
          const: error
          description: Event type identifier (always "error").
        timestamp:
          type: string
          format: date-time
          description: Time the error occurred.
        error:
          $ref: '#/components/schemas/Error'
    AppVersionSummary:
      type: object
      description: Summary of an application version.
      properties:
        id:
          type: string
          description: Unique identifier for the app version
          example: rr33xuugxj9h0bkf1rdt2bet
        app_name:
          type: string
          description: Name of the application
          example: my-app
        version:
          type: string
          description: Version label for the application
          example: 1.0.0
        region:
          type: string
          description: Deployment region code
          example: aws.us-east-1a
          const: aws.us-east-1a
        deployment:
          type: string
          description: Deployment ID
        actions:
          type: array
          description: List of actions available on the app
          items:
            $ref: '#/components/schemas/AppAction'
        env_vars:
          type: object
          description: Environment variables configured for this app version
          additionalProperties:
            type: string
      required:
        - id
        - app_name
        - version
        - region
        - deployment
        - actions
        - env_vars
    InvocationUpdateRequest:
      type: object
      description: Request body for updating an invocation.
      properties:
        status:
          type: string
          description: New status for the invocation.
          enum:
            - succeeded
            - failed
        output:
          type: string
          description: Updated output of the invocation rendered as JSON string.
      required:
        - status
    Deployment:
      type: object
      description: Deployment record information.
      properties:
        id:
          type: string
          description: Unique identifier for the deployment
          example: rr33xuugxj9h0bkf1rdt2bet
        status:
          type: string
          description: Current status of the deployment
          enum:
            - queued
            - in_progress
            - running
            - failed
            - stopped
          example: queued
        status_reason:
          type: string
          description: Status reason
          example: Deployment in progress
        region:
          type: string
          description: Deployment region code
          example: aws.us-east-1a
          const: aws.us-east-1a
        entrypoint_rel_path:
          type: string
          description: Relative path to the application entrypoint
          example: src/app.py
        env_vars:
          type: object
          description: Environment variables configured for this deployment
          additionalProperties:
            type: string
        created_at:
          type: string
          format: date-time
          description: Timestamp when the deployment was created
        updated_at:
          type: string
          format: date-time
          nullable: true
          description: Timestamp when the deployment was last updated
      required:
        - id
        - status
        - region
        - created_at
    DeploymentSource:
      type: object
      description: Source from which to fetch application code.
      properties:
        type:
          type: string
          description: Source type identifier.
          enum:
            - github
          example: github
        url:
          type: string
          description: Base repository URL (without blob/tree suffixes).
          example: https://github.com/org/repo
        ref:
          type: string
          description: Git ref (branch, tag, or commit SHA) to fetch.
          example: main
        path:
          type: string
          description: Path within the repo to deploy (omit to use repo root).
          example: apps/api
        entrypoint:
          type: string
          description: >-
            Relative path to the application entrypoint within the selected
            path.
          example: src/index.ts
        auth:
          type: object
          description: Authentication for private repositories.
          properties:
            method:
              type: string
              enum:
                - github_token
              description: Auth method
              example: github_token
            token:
              type: string
              format: password
              description: GitHub PAT or installation access token
              example: ghs_***
          required:
            - method
            - token
      required:
        - type
        - url
        - ref
        - entrypoint
    DeploymentRequest:
      type: object
      description: >-
        App deployment request. Provide either file+entrypoint_rel_path or
        source.
      properties:
        version:
          type: string
          description: Version of the application. Can be any string.
          example: 1.0.0
          default: latest
        file:
          type: string
          format: binary
          description: ZIP file containing the application source directory
          example: '@path/to/file.zip'
        entrypoint_rel_path:
          type: string
          description: Relative path to the entrypoint of the application
          example: src/app.py
        source:
          $ref: '#/components/schemas/DeploymentSource'
        region:
          type: string
          description: Region for deployment. Currently we only support "aws.us-east-1a"
          example: aws.us-east-1a
          default: aws.us-east-1a
          const: aws.us-east-1a
        force:
          type: boolean
          description: Allow overwriting an existing app version
          example: false
          default: false
        env_vars:
          type: object
          description: >-
            Map of environment variables to set for the deployed application.
            Each key-value pair represents an environment variable.
          additionalProperties:
            type: string
      oneOf:
        - required:
            - file
            - entrypoint_rel_path
        - required:
            - source
    DeploymentStateEvent:
      type: object
      description: An event representing the current state of a deployment.
      required:
        - event
        - deployment
        - timestamp
      properties:
        event:
          type: string
          const: deployment_state
          description: Event type identifier (always "deployment_state").
        deployment:
          $ref: '#/components/schemas/Deployment'
        timestamp:
          type: string
          format: date-time
          description: Time the state was reported.
    DeploymentEvent:
      oneOf:
        - $ref: '#/components/schemas/LogEvent'
        - $ref: '#/components/schemas/DeploymentStateEvent'
        - $ref: '#/components/schemas/AppVersionSummaryEvent'
        - $ref: '#/components/schemas/ErrorEvent'
        - $ref: '#/components/schemas/SSEHeartbeatEvent'
      discriminator:
        propertyName: event
        mapping:
          log: '#/components/schemas/LogEvent'
          deployment_state: '#/components/schemas/DeploymentStateEvent'
          app_version_summary: '#/components/schemas/AppVersionSummary'
          error: '#/components/schemas/InternalError'
          sse_heartbeat: '#/components/schemas/SSEHeartbeatEvent'
      description: Union type representing any deployment event.
    InvocationStateEvent:
      type: object
      description: An event representing the current state of an invocation.
      required:
        - event
        - invocation
        - timestamp
      properties:
        event:
          type: string
          const: invocation_state
          description: Event type identifier (always "invocation_state").
        invocation:
          $ref: '#/components/schemas/Invocation'
        timestamp:
          type: string
          format: date-time
          description: Time the state was reported.
    InvocationEvent:
      oneOf:
        - $ref: '#/components/schemas/LogEvent'
        - $ref: '#/components/schemas/InvocationStateEvent'
        - $ref: '#/components/schemas/ErrorEvent'
        - $ref: '#/components/schemas/SSEHeartbeatEvent'
      discriminator:
        propertyName: event
        mapping:
          log: '#/components/schemas/LogEvent'
          invocation_state: '#/components/schemas/InvocationStateEvent'
          error: '#/components/schemas/ErrorEvent'
          sse_heartbeat: '#/components/schemas/SSEHeartbeatEvent'
      description: Union type representing any invocation event.
    ManagedAuthStateEvent:
      type: object
      description: An event representing the current state of a managed auth flow.
      required:
        - event
        - timestamp
        - flow_status
        - flow_step
      properties:
        event:
          type: string
          const: managed_auth_state
          description: Event type identifier (always "managed_auth_state").
        timestamp:
          type: string
          format: date-time
          description: Time the state was reported.
        flow_status:
          type: string
          enum:
            - IN_PROGRESS
            - SUCCESS
            - FAILED
            - EXPIRED
            - CANCELED
          description: Current flow status.
        flow_step:
          type: string
          enum:
            - DISCOVERING
            - AWAITING_INPUT
            - AWAITING_EXTERNAL_ACTION
            - SUBMITTING
            - COMPLETED
          description: Current step in the flow.
        flow_type:
          type: string
          enum:
            - LOGIN
            - REAUTH
          description: Type of the current flow.
        discovered_fields:
          type: array
          description: >-
            Fields awaiting input (present when flow_step=AWAITING_INPUT; may
            also be present with AWAITING_EXTERNAL_ACTION as fallback actions).
          items:
            $ref: '#/components/schemas/DiscoveredField'
        mfa_options:
          type: array
          description: >-
            MFA method options (present when flow_step=AWAITING_INPUT; may also
            be present with AWAITING_EXTERNAL_ACTION as fallback actions).
          items:
            $ref: '#/components/schemas/MFAOption'
        sign_in_options:
          type: array
          description: >-
            Non-MFA choices presented during the auth flow, such as account
            selection or org pickers (present when flow_step=AWAITING_INPUT; may
            also be present with AWAITING_EXTERNAL_ACTION as fallback actions).
          items:
            $ref: '#/components/schemas/SignInOption'
        pending_sso_buttons:
          type: array
          description: >-
            SSO buttons available (present when flow_step=AWAITING_INPUT; may
            also be present with AWAITING_EXTERNAL_ACTION as fallback actions).
          items:
            $ref: '#/components/schemas/SSOButton'
        external_action_message:
          type: string
          description: >-
            Instructions for external action (present when
            flow_step=AWAITING_EXTERNAL_ACTION).
        website_error:
          type: string
          description: >-
            Visible error message from the website (e.g., 'Incorrect password').
            Present when the website displays an error during login.
        error_message:
          type: string
          description: Error message (present when flow_status=FAILED).
        error_code:
          type: string
          description: Machine-readable error code (present when flow_status=FAILED).
        post_login_url:
          type: string
          format: uri
          description: URL where the browser landed after successful login.
        live_view_url:
          type: string
          format: uri
          description: Browser live view URL for debugging.
        hosted_url:
          type: string
          format: uri
          description: URL to redirect user to for hosted login.
    ManagedAuthEvent:
      oneOf:
        - $ref: '#/components/schemas/ManagedAuthStateEvent'
        - $ref: '#/components/schemas/ErrorEvent'
        - $ref: '#/components/schemas/SSEHeartbeatEvent'
      discriminator:
        propertyName: event
        mapping:
          managed_auth_state: '#/components/schemas/ManagedAuthStateEvent'
          error: '#/components/schemas/ErrorEvent'
          sse_heartbeat: '#/components/schemas/SSEHeartbeatEvent'
      description: Union type representing any managed auth event.
    SSEHeartbeatEvent:
      type: object
      description: Heartbeat event sent periodically to keep SSE connection alive.
      required:
        - event
        - timestamp
      properties:
        event:
          type: string
          const: sse_heartbeat
          description: Event type identifier (always "sse_heartbeat").
        timestamp:
          type: string
          format: date-time
          description: Time the heartbeat was sent.
    BrowserReplay:
      type: object
      description: Information about a browser replay recording.
      required:
        - replay_id
      properties:
        replay_id:
          type: string
          description: Unique identifier for the replay recording.
        started_at:
          type: string
          format: date-time
          nullable: true
          description: Timestamp when replay started
        finished_at:
          type: string
          format: date-time
          nullable: true
          description: Timestamp when replay finished
        replay_view_url:
          type: string
          description: URL for viewing the replay recording.
          example: >-
            https://api.onkernel.com/browser/replays?jwt=eyJ0eXAi...&replay_id=7e2c1a9f-1234-4cde-9abc-ffeedd001122
    StartFsWatchRequest:
      type: object
      required:
        - path
      properties:
        path:
          type: string
          description: Directory to watch.
        recursive:
          type: boolean
          description: Whether to watch recursively.
          default: false
      additionalProperties: false
    FileSystemEvent:
      type: object
      description: Filesystem change event.
      required:
        - type
        - path
      properties:
        type:
          type: string
          enum:
            - CREATE
            - WRITE
            - DELETE
            - RENAME
          description: Event type.
        name:
          type: string
          description: Base name of the file or directory affected.
        path:
          type: string
          description: Absolute path of the file or directory.
        is_dir:
          type: boolean
          description: Whether the affected path is a directory.
    FileInfo:
      type: object
      required:
        - name
        - path
        - size_bytes
        - is_dir
        - mod_time
        - mode
      properties:
        name:
          type: string
          description: Base name of the file or directory.
        path:
          type: string
          description: Absolute path.
        size_bytes:
          type: integer
          description: Size in bytes. 0 for directories.
        is_dir:
          type: boolean
          description: Whether the path is a directory.
        mod_time:
          type: string
          format: date-time
          description: Last modification time.
        mode:
          type: string
          description: File mode bits (e.g., "drwxr-xr-x" or "-rw-r--r--").
    ListFiles:
      type: array
      description: Array of file or directory information entries.
      items:
        $ref: '#/components/schemas/FileInfo'
    CreateDirectoryRequest:
      type: object
      required:
        - path
      properties:
        path:
          type: string
          description: Absolute directory path to create.
          pattern: ^/.*
        mode:
          type: string
          description: Optional directory mode (octal string, e.g. 755). Defaults to 755.
          pattern: ^[0-7]{3,4}$
      additionalProperties: false
    DeletePathRequest:
      type: object
      required:
        - path
      properties:
        path:
          type: string
          description: Absolute path to delete.
          pattern: ^/.*
      additionalProperties: false
    SetFilePermissionsRequest:
      type: object
      required:
        - path
        - mode
      properties:
        path:
          type: string
          description: Absolute path whose permissions are to be changed.
          pattern: ^/.*
        owner:
          type: string
          description: New owner username or UID.
        group:
          type: string
          description: New group name or GID.
        mode:
          type: string
          description: File mode bits (octal string, e.g. 644).
          pattern: ^[0-7]{3,4}$
      additionalProperties: false
    MovePathRequest:
      type: object
      required:
        - src_path
        - dest_path
      properties:
        src_path:
          type: string
          description: Absolute source path.
          pattern: ^/.*
        dest_path:
          type: string
          description: Absolute destination path.
          pattern: ^/.*
      additionalProperties: false
    BrowserCurlRequest:
      type: object
      description: Request to make an HTTP request through the browser's network stack.
      required:
        - url
      properties:
        url:
          type: string
          description: Target URL (must be http or https).
        method:
          type: string
          description: HTTP method.
          enum:
            - GET
            - HEAD
            - POST
            - PUT
            - PATCH
            - DELETE
            - OPTIONS
          default: GET
        headers:
          type: object
          description: Custom headers merged with browser defaults.
          additionalProperties:
            type: string
        body:
          type: string
          description: Request body (for POST/PUT/PATCH).
        timeout_ms:
          type: integer
          description: Request timeout in milliseconds.
          minimum: 1000
          maximum: 60000
          default: 30000
        response_encoding:
          type: string
          description: Encoding for the response body. Use base64 for binary content.
          enum:
            - utf8
            - base64
          default: utf8
      additionalProperties: false
    BrowserCurlResult:
      type: object
      description: Structured response from the browser curl request.
      required:
        - status
        - headers
        - body
        - duration_ms
      properties:
        status:
          type: integer
          description: HTTP status code from target.
        headers:
          type: object
          description: Response headers (multi-value).
          additionalProperties:
            type: array
            items:
              type: string
        body:
          type: string
          description: Response body (UTF-8 string or base64 depending on request).
        duration_ms:
          type: integer
          description: Total request duration in milliseconds.
      additionalProperties: false
    BrowserCurlTransportError:
      type: object
      description: Transport-level error when the request could not complete.
      required:
        - message
      properties:
        message:
          type: string
          description: Human-readable error description.
        net_error:
          type: integer
          description: Chromium net error code.
        net_error_name:
          type: string
          description: Chromium net error name.
      additionalProperties: false
    ProcessExecRequest:
      type: object
      description: Request to execute a command synchronously.
      required:
        - command
      properties:
        command:
          type: string
          description: Executable or shell command to run.
        args:
          type: array
          description: Command arguments.
          items:
            type: string
          default: []
        cwd:
          type: string
          description: Working directory (absolute path) to run the command in.
          nullable: true
          pattern: ^/.*
        env:
          type: object
          description: Environment variables to set for the process.
          additionalProperties:
            type: string
          default: {}
        as_user:
          type: string
          description: Run the process as this user.
          nullable: true
        as_root:
          type: boolean
          description: Run the process with root privileges.
          default: false
        timeout_sec:
          type: integer
          description: Maximum execution time in seconds.
          nullable: true
      additionalProperties: false
    ProcessExecResult:
      type: object
      description: Result of a synchronous command execution.
      properties:
        exit_code:
          type: integer
          description: Process exit code.
        stdout_b64:
          type: string
          description: Base64-encoded stdout buffer.
        stderr_b64:
          type: string
          description: Base64-encoded stderr buffer.
        duration_ms:
          type: integer
          description: Execution duration in milliseconds.
      additionalProperties: false
    ProcessSpawnRequest:
      allOf:
        - $ref: '#/components/schemas/ProcessExecRequest'
        - type: object
          properties:
            allocate_tty:
              type: boolean
              description: Allocate a pseudo-terminal (PTY) for interactive shells.
              default: false
            rows:
              type: integer
              description: Initial terminal rows. Only used when allocate_tty is true.
              minimum: 1
              maximum: 65535
            cols:
              type: integer
              description: Initial terminal columns. Only used when allocate_tty is true.
              minimum: 1
              maximum: 65535
    ProcessResizeRequest:
      type: object
      description: Resize a PTY-backed process terminal.
      required:
        - rows
        - cols
      properties:
        rows:
          type: integer
          minimum: 1
          maximum: 65535
          description: New terminal rows.
        cols:
          type: integer
          minimum: 1
          maximum: 65535
          description: New terminal columns.
      additionalProperties: false
    ProcessSpawnResult:
      type: object
      description: Information about a spawned process.
      properties:
        process_id:
          type: string
          format: uuid
          description: Server-assigned identifier for the process.
        pid:
          type: integer
          description: OS process ID.
        started_at:
          type: string
          format: date-time
          description: Timestamp when the process started.
      additionalProperties: false
    ProcessStatus:
      type: object
      description: Current status of a process.
      properties:
        state:
          type: string
          enum:
            - running
            - exited
          description: Process state.
        exit_code:
          type: integer
          nullable: true
          description: Exit code if the process has exited.
        cpu_pct:
          type: number
          description: Estimated CPU usage percentage.
        mem_bytes:
          type: integer
          description: Estimated resident memory usage in bytes.
      additionalProperties: false
    ProcessStdinRequest:
      type: object
      description: Data to write to the process standard input.
      required:
        - data_b64
      properties:
        data_b64:
          type: string
          description: Base64-encoded data to write.
      additionalProperties: false
    ProcessStdinResult:
      type: object
      description: Result of writing to stdin.
      properties:
        written_bytes:
          type: integer
          description: Number of bytes written.
      additionalProperties: false
    ProcessKillRequest:
      type: object
      description: Signal to send to the process.
      required:
        - signal
      properties:
        signal:
          type: string
          enum:
            - TERM
            - KILL
            - INT
            - HUP
          default: TERM
          description: Signal to send.
      additionalProperties: false
    ProcessStreamEvent:
      type: object
      description: SSE payload representing process output or lifecycle events.
      properties:
        stream:
          type: string
          description: Source stream of the data chunk.
          enum:
            - stdout
            - stderr
        data_b64:
          type: string
          description: Base64-encoded data from the process stream.
        event:
          type: string
          description: Lifecycle event type.
          enum:
            - exit
        exit_code:
          type: integer
          description: Exit code when the event is "exit".
      additionalProperties: false
    ExecutePlaywrightRequest:
      type: object
      description: Request to execute Playwright code
      required:
        - code
      properties:
        code:
          type: string
          description: >
            TypeScript/JavaScript code to execute. The code has access to
            'page', 'context', and 'browser' variables.

            It runs within a function, so you can use a return statement at the
            end to return a value.

            This value is returned as the `result` property in the response.

            Example: "await page.goto('https://example.com'); return await
            page.title();"
        timeout_sec:
          type: integer
          description: Maximum execution time in seconds. Default is 60.
          default: 60
          minimum: 1
          maximum: 300
      additionalProperties: false
    ExecutePlaywrightResult:
      type: object
      description: Result of Playwright code execution
      required:
        - success
      properties:
        success:
          type: boolean
          description: Whether the code executed successfully
        result:
          description: The value returned by the code (if any)
        error:
          type: string
          description: Error message if execution failed
        stdout:
          type: string
          description: Standard output from the execution
        stderr:
          type: string
          description: Standard error from the execution
      additionalProperties: false
    ManagedAuthExchangeRequest:
      type: object
      description: Request to exchange handoff code for JWT
      required:
        - code
      properties:
        code:
          type: string
          description: Handoff code from start endpoint
          example: abc123xyz
      additionalProperties: false
    ManagedAuthExchangeResponse:
      type: object
      description: Response from exchange endpoint
      required:
        - invocation_id
        - jwt
      properties:
        invocation_id:
          type: string
          description: Invocation ID
          example: abc123xyz
        jwt:
          type: string
          description: JWT token with invocation_id claim (30 minute TTL)
          example: eyJ0eXAi...
      additionalProperties: false
    DiscoveredField:
      type: object
      description: A discovered form field
      properties:
        name:
          type: string
          description: Field name
          example: email
        type:
          type: string
          enum:
            - text
            - email
            - password
            - tel
            - number
            - url
            - code
            - totp
          description: Field type
          example: email
        label:
          type: string
          description: Field label
          example: Email address
        placeholder:
          type: string
          description: Field placeholder
          example: you@example.com
        required:
          type: boolean
          description: Whether field is required
          default: true
          example: true
        selector:
          type: string
          description: CSS selector for the field
          example: input#email
        linked_mfa_type:
          $ref: '#/components/schemas/MFAType'
          nullable: true
          description: >-
            If this field is associated with an MFA option, the type of that
            option (e.g., password field linked to "Enter password" option)
        hint:
          type: string
          description: >-
            Contextual help text near the field that tells the user what to
            enter (e.g., "Enter the phone ending in (***) ***-**92")
          example: Enter the phone ending in (***) ***-**92
      required:
        - name
        - type
        - label
        - selector
      additionalProperties: false
    MFAType:
      type: string
      enum:
        - sms
        - call
        - email
        - totp
        - push
        - password
        - switch
      description: >-
        The MFA delivery method type. Includes 'password' for auth method
        selection pages and 'switch' for generic method-switcher links like "Use
        another method" that do not name a specific method.
      example: sms
    MFAOption:
      type: object
      description: An MFA method option for verification
      properties:
        type:
          $ref: '#/components/schemas/MFAType'
        label:
          type: string
          description: The visible option text
          example: Text me a code
        target:
          type: string
          nullable: true
          description: The masked destination (phone/email) if shown
          example: '***-***-5678'
        description:
          type: string
          nullable: true
          description: Additional instructions from the site
          example: We'll send a 6-digit code to your phone
      required:
        - type
        - label
      additionalProperties: false
    SignInOption:
      type: object
      description: >-
        A non-MFA choice presented during the auth flow (e.g. account selection,
        org picker)
      properties:
        id:
          type: string
          description: Unique identifier for this option (used to submit selection back)
          example: work-account
        label:
          type: string
          description: Display text for the option
          example: Work Account (user@company.com)
        description:
          type: string
          nullable: true
          description: Additional context such as email address or org name
          example: user@company.com
      required:
        - id
        - label
      additionalProperties: false
    AgentAuthSubmitRequest:
      type: object
      description: >-
        Request to submit an auth form. Provide exactly one of field_values,
        sso_button, or selected_mfa_type.
      oneOf:
        - required:
            - field_values
          properties:
            field_values:
              type: object
              description: Values for the discovered login fields
              additionalProperties:
                type: string
              example:
                email: user@example.com
                password: '********'
        - required:
            - sso_button
          properties:
            sso_button:
              type: string
              description: Selector of SSO button to click
              example: xpath=//button[contains(text(), 'Continue with Google')]
        - required:
            - selected_mfa_type
          properties:
            selected_mfa_type:
              allOf:
                - $ref: '#/components/schemas/MFAType'
                - description: >-
                    The MFA method type to select (when mfa_options were
                    returned)
      additionalProperties: false
    AgentAuthSubmitResponse:
      type: object
      description: >-
        Response from submit endpoint - returns immediately after submission is
        accepted
      required:
        - accepted
      properties:
        accepted:
          type: boolean
          description: Whether the submission was accepted for processing
      additionalProperties: false
    AgentAuthInvocationResponse:
      type: object
      description: Response from get invocation endpoint
      required:
        - app_name
        - domain
        - status
        - step
        - type
        - expires_at
      properties:
        app_name:
          type: string
          description: App name (org name at time of invocation creation)
          example: Acme Corp
        domain:
          type: string
          description: Domain for authentication
          example: doordash.com
        status:
          type: string
          enum:
            - IN_PROGRESS
            - SUCCESS
            - EXPIRED
            - CANCELED
            - FAILED
          description: Invocation status
          example: IN_PROGRESS
        step:
          type: string
          enum:
            - initialized
            - discovering
            - awaiting_input
            - awaiting_external_action
            - submitting
            - completed
            - expired
          description: Current step in the invocation workflow
          example: awaiting_input
        type:
          type: string
          enum:
            - login
            - reauth
          description: |
            The session type:
            - login: User-initiated authentication
            - reauth: System-triggered re-authentication (via health check)
          example: login
        expires_at:
          type: string
          format: date-time
          description: When the handoff code expires
          example: '2025-11-05T20:00:00Z'
        pending_fields:
          type: array
          nullable: true
          description: Fields currently awaiting input (present when step=awaiting_input)
          items:
            $ref: '#/components/schemas/DiscoveredField'
        mfa_options:
          type: array
          nullable: true
          description: >-
            MFA method options to choose from (present when step=awaiting_input
            and MFA selection is required)
          items:
            $ref: '#/components/schemas/MFAOption'
        sign_in_options:
          type: array
          nullable: true
          description: >-
            Non-MFA choices to select from (present when step=awaiting_input and
            account/org selection is required)
          items:
            $ref: '#/components/schemas/SignInOption'
        submitted_fields:
          type: array
          nullable: true
          description: >-
            Names of fields that have been submitted (present when
            step=submitting or later)
          items:
            type: string
          example:
            - identifier
            - password
        error_message:
          type: string
          nullable: true
          description: >-
            Error message explaining why the invocation failed (present when
            status=FAILED)
          example: Invalid password
        live_view_url:
          type: string
          nullable: true
          description: Browser live view URL for debugging the invocation
          example: https://live.kernel.com/abc123xyz
        pending_sso_buttons:
          type: array
          nullable: true
          description: SSO buttons available on the page (present when step=awaiting_input)
          items:
            $ref: '#/components/schemas/SSOButton'
        external_action_message:
          type: string
          nullable: true
          description: >-
            Instructions for user when external action is required (present when
            step=awaiting_external_action)
          example: Tap 'Yes' on the Google prompt on your phone
        sso_provider:
          type: string
          nullable: true
          description: >-
            SSO provider being used for authentication (e.g., google, github,
            microsoft)
          example: google
      additionalProperties: false
    SSOButton:
      type: object
      description: An SSO button for signing in with an external identity provider
      properties:
        selector:
          type: string
          description: XPath selector for the button
          example: xpath=//button[contains(text(), 'Continue with Google')]
        provider:
          type: string
          description: Identity provider name
          example: google
        label:
          type: string
          description: Visible button text
          example: Continue with Google
      required:
        - selector
        - provider
        - label
      additionalProperties: false
    AuthAgent:
      type: object
      description: >-
        An auth agent that manages authentication for a specific domain and
        profile combination
      required:
        - id
        - profile_name
        - domain
        - status
      properties:
        id:
          type: string
          description: Unique identifier for the auth agent
          example: abc123xyz
        profile_name:
          type: string
          description: Name of the profile associated with this auth agent
          example: my-netflix-profile
        domain:
          type: string
          description: Target domain for authentication
          example: netflix.com
        status:
          type: string
          enum:
            - AUTHENTICATED
            - NEEDS_AUTH
          description: Current authentication status of the managed profile
          example: AUTHENTICATED
        last_auth_check_at:
          type: string
          format: date-time
          description: When the last authentication check was performed
          example: '2025-01-15T10:30:00Z'
        credential_id:
          type: string
          description: >-
            ID of the linked Kernel credential for automatic re-authentication
            (deprecated, use credential)
          example: cred_abc123xyz
        credential:
          $ref: '#/components/schemas/CredentialReference'
        has_selectors:
          type: boolean
          description: >-
            Whether this auth agent has stored selectors for deterministic
            re-authentication
          example: true
        can_reauth:
          type: boolean
          description: >-
            Whether automatic re-authentication is possible (has credential_id,
            selectors, and login_url)
          example: true
        can_reauth_reason:
          type: string
          description: Reason why automatic re-authentication is or is not possible
          example: has_credential
        allowed_domains:
          type: array
          items:
            type: string
          description: >
            Additional domains that are valid for this auth agent's
            authentication flow (besides the primary domain). Useful when login
            pages redirect to different domains.


            The following SSO/OAuth provider domains are automatically allowed
            by default and do not need to be specified:

            - Google: accounts.google.com

            - Microsoft/Azure AD: login.microsoftonline.com, login.live.com

            - Okta: *.okta.com, *.oktapreview.com

            - Auth0: *.auth0.com, *.us.auth0.com, *.eu.auth0.com, *.au.auth0.com

            - Apple: appleid.apple.com

            - GitHub: github.com

            - Facebook/Meta: www.facebook.com

            - LinkedIn: www.linkedin.com

            - Amazon Cognito: *.amazoncognito.com

            - OneLogin: *.onelogin.com

            - Ping Identity: *.pingone.com, *.pingidentity.com
          example:
            - login.netflix.com
            - auth.netflix.com
        post_login_url:
          type: string
          format: uri
          description: >-
            URL where the browser landed after successful login. Query
            parameters and fragments are stripped for privacy.
          example: https://www.netflix.com/browse
      additionalProperties: false
    ManagedAuth:
      type: object
      description: >-
        Managed authentication that keeps a profile logged into a specific
        domain. Flow fields (flow_status, flow_step, discovered_fields,
        mfa_options) reflect the most recent login flow and are null when no
        flow has been initiated.
      required:
        - id
        - profile_name
        - domain
        - status
        - save_credentials
        - record_session
      properties:
        id:
          type: string
          description: Unique identifier for the auth connection
          example: ma_abc123xyz
        profile_name:
          type: string
          description: Name of the profile associated with this auth connection
          example: my-netflix-profile
        domain:
          type: string
          description: Target domain for authentication
          example: netflix.com
        status:
          type: string
          enum:
            - AUTHENTICATED
            - NEEDS_AUTH
          description: Current authentication status of the managed profile
          example: AUTHENTICATED
        last_auth_check_at:
          type: string
          format: date-time
          description: >-
            When the most recent auth health check ran for this connection,
            regardless of outcome. Updated on every health check and does not by
            itself indicate that the profile is currently authenticated - use
            `status` for that. May be newer than `flow_expires_at` when a flow
            is still in progress because health checks continue to run in
            parallel.
          example: '2025-01-15T10:30:00Z'
        last_auth_at:
          type: string
          format: date-time
          deprecated: true
          description: >-
            Deprecated alias for `last_auth_check_at`. Despite the name, this is
            the last health-check timestamp, not the last successful
            authentication. Use `last_auth_check_at` instead.
          example: '2025-01-15T10:30:00Z'
        credential:
          $ref: '#/components/schemas/CredentialReference'
        can_reauth:
          type: boolean
          description: >-
            Whether Kernel can automatically re-authenticate this connection
            when the session expires. Requires a prior successful login plus
            either a Kernel credential or an external credential reference. See
            `can_reauth_reason` for the specific outcome.
          example: true
        can_reauth_reason:
          type: string
          description: |-
            Machine-readable reason for the current value of `can_reauth`.
            Affirmative values (re-auth is possible):
              - `external_credential` — an external credential provider is attached
              - `cua_has_credential` — CUA flow with a stored credential
              - `has_credential` — Kernel credential is attached (optimistic; plan viability not checked)
              - `viable_plans_found` — at least one stored login plan can be replayed
              - `no_requirements_recorded` — no recorded credential requirements to fail against
              - `requirements_satisfiable` — recorded requirements can be met by the attached credential

            Negative values (a human must complete the login flow):
              - `no_prior_successful_login` — connection has never completed a successful login
              - `no_credential` — no Kernel or external credential attached
              - `no_viable_plans` — credential attached but no replayable login plan exists yet
              - `viable_plans_require_external_action` — stored plans need an external step (email link, push, etc.)
              - `requires_external_action` — recorded requirements include an external step
              - `requires_totp_without_secret` — flow needs a TOTP code but no TOTP secret is stored
              - `requires_sms_code` — flow needs an SMS code that cannot be received automatically
              - `requires_email_code` — flow needs an email code that cannot be received automatically
          enum:
            - external_credential
            - cua_has_credential
            - has_credential
            - viable_plans_found
            - no_requirements_recorded
            - requirements_satisfiable
            - no_prior_successful_login
            - no_credential
            - no_viable_plans
            - viable_plans_require_external_action
            - requires_external_action
            - requires_totp_without_secret
            - requires_sms_code
            - requires_email_code
          example: has_credential
        proxy_id:
          type: string
          description: ID of the proxy associated with this connection, if any.
        allowed_domains:
          type: array
          items:
            type: string
          description: >
            Additional domains that are valid for this auth flow (besides the
            primary domain). Useful when login pages redirect to different
            domains.


            The following SSO/OAuth provider domains are automatically allowed
            by default and do not need to be specified:

            - Google: accounts.google.com

            - Microsoft/Azure AD: login.microsoftonline.com, login.live.com

            - Okta: *.okta.com, *.oktapreview.com

            - Auth0: *.auth0.com, *.us.auth0.com, *.eu.auth0.com, *.au.auth0.com

            - Apple: appleid.apple.com

            - GitHub: github.com

            - Facebook/Meta: www.facebook.com

            - LinkedIn: www.linkedin.com

            - Amazon Cognito: *.amazoncognito.com

            - OneLogin: *.onelogin.com

            - Ping Identity: *.pingone.com, *.pingidentity.com
          example:
            - login.netflix.com
            - auth.netflix.com
        login_url:
          type: string
          format: uri
          description: Optional login page URL to skip discovery
          example: https://example.com/login
        post_login_url:
          type: string
          format: uri
          description: URL where the browser landed after successful login
          example: https://www.netflix.com/browse
        flow_status:
          type: string
          enum:
            - IN_PROGRESS
            - SUCCESS
            - FAILED
            - EXPIRED
            - CANCELED
          nullable: true
          description: Current flow status (null when no flow in progress)
          example: IN_PROGRESS
        flow_step:
          type: string
          enum:
            - DISCOVERING
            - AWAITING_INPUT
            - AWAITING_EXTERNAL_ACTION
            - SUBMITTING
            - COMPLETED
          nullable: true
          description: Current step in the flow (null when no flow in progress)
          example: AWAITING_INPUT
        flow_type:
          type: string
          enum:
            - LOGIN
            - REAUTH
          nullable: true
          description: Type of the current flow (null when no flow in progress)
          example: LOGIN
        flow_expires_at:
          type: string
          format: date-time
          nullable: true
          description: >-
            When the current flow expires (null when no flow in progress). A
            flow past this timestamp is no longer valid and its `flow_status`
            will be `EXPIRED`. Clients may start a new login to supersede a
            stale `IN_PROGRESS` flow past this timestamp.
          example: '2025-11-05T20:00:00Z'
        discovered_fields:
          type: array
          nullable: true
          description: >-
            Fields awaiting input (present when flow_step=awaiting_input; may
            also be present with awaiting_external_action as fallback actions)
          items:
            $ref: '#/components/schemas/DiscoveredField'
        mfa_options:
          type: array
          nullable: true
          description: >-
            MFA method options (present when flow_step=awaiting_input; may also
            be present with awaiting_external_action as fallback actions)
          items:
            $ref: '#/components/schemas/MFAOption'
        sign_in_options:
          type: array
          nullable: true
          description: >-
            Non-MFA choices presented during the auth flow, such as account
            selection or org pickers (present when flow_step=awaiting_input; may
            also be present with awaiting_external_action as fallback actions).
          items:
            $ref: '#/components/schemas/SignInOption'
        pending_sso_buttons:
          type: array
          nullable: true
          description: >-
            SSO buttons available (present when flow_step=awaiting_input; may
            also be present with awaiting_external_action as fallback actions)
          items:
            $ref: '#/components/schemas/SSOButton'
        external_action_message:
          type: string
          nullable: true
          description: >-
            Instructions for external action (present when
            flow_step=awaiting_external_action)
          example: Tap 'Yes' on the Google prompt on your phone
        website_error:
          type: string
          nullable: true
          description: >-
            Visible error message from the website (e.g., 'Incorrect password').
            Present when the website displays an error during login.
        sso_provider:
          type: string
          nullable: true
          description: SSO provider being used (e.g., google, github, microsoft)
          example: google
        error_message:
          type: string
          nullable: true
          description: Error message (present when flow_status=failed)
          example: Invalid password
        error_code:
          type: string
          nullable: true
          description: Machine-readable error code (present when flow_status=failed)
        hosted_url:
          type: string
          format: uri
          nullable: true
          description: >-
            URL to redirect user to for hosted login (present when flow in
            progress)
          example: https://auth.kernel.com/login/abc123xyz
        live_view_url:
          type: string
          format: uri
          nullable: true
          description: Browser live view URL for debugging (present when flow in progress)
          example: https://live.kernel.com/abc123xyz
        browser_session_id:
          type: string
          nullable: true
          description: >
            ID of the underlying browser session driving the current flow
            (present when flow in progress).

            Use this to inspect or terminate the browser session via the
            `/browsers` API.
          example: bs_abc123xyz
        health_check_interval:
          type: integer
          nullable: true
          minimum: 300
          maximum: 86400
          description: >
            Interval in seconds between automatic health checks. When set, the
            system periodically

            verifies the authentication status and triggers re-authentication if
            needed.

            Maximum is 86400 (24 hours). Default is 3600 (1 hour). The minimum
            depends on your plan:

            Enterprise: 300 (5 minutes), Startup: 1200 (20 minutes), Hobbyist:
            3600 (1 hour).
          example: 3600
        health_checks:
          type: boolean
          description: >
            Whether periodic health checks are enabled for this connection. When
            false, the system

            will not automatically verify authentication status, and
            `auto_reauth` has no effect on

            the automatic flow (since re-auth is only triggered by a failed
            scheduled health check).

            Manually triggering a health check via the API still works
            regardless of this setting.
          example: true
        auto_reauth:
          type: boolean
          description: >
            Whether automatic re-authentication is permitted for this
            connection. This is an opt-in

            flag only — it does not check whether re-auth is actually feasible.
            Even when true,

            re-auth only runs when the system has what it needs to perform it
            (for example, saved

            credentials for the required login fields), and only after a
            scheduled health check

            detects an expired session — so this flag has no effect when
            `health_checks` is false.

            When false, expired sessions detected by a health check are marked
            as `NEEDS_AUTH`

            instead of attempting re-auth.
          example: true
        save_credentials:
          type: boolean
          description: >-
            Whether credentials are saved after every successful login. One-time
            codes (TOTP, SMS, etc.) are not saved.
          example: true
        record_session:
          type: boolean
          description: >-
            Whether to record browser session replays for this connection by
            default. Useful for debugging login flows. Can be overridden
            per-login.
          example: false
      additionalProperties: false
    ManagedAuthCreateRequest:
      type: object
      description: Request to create an auth connection for a profile and domain
      required:
        - domain
        - profile_name
      properties:
        domain:
          type: string
          description: Domain for authentication
          example: netflix.com
        profile_name:
          type: string
          description: >-
            Name of the profile to manage authentication for. If the profile
            does not exist, it is created automatically.
          example: user-123
        login_url:
          type: string
          format: uri
          description: Optional login page URL to skip discovery
          example: https://netflix.com/login
        proxy:
          $ref: '#/components/schemas/ProxyRef'
        credential:
          $ref: '#/components/schemas/CredentialReference'
        allowed_domains:
          type: array
          items:
            type: string
          description: >
            Additional domains valid for this auth flow (besides the primary
            domain). Useful when login pages redirect to different domains.


            The following SSO/OAuth provider domains are automatically allowed
            by default and do not need to be specified:

            - Google: accounts.google.com

            - Microsoft/Azure AD: login.microsoftonline.com, login.live.com

            - Okta: *.okta.com, *.oktapreview.com

            - Auth0: *.auth0.com, *.us.auth0.com, *.eu.auth0.com, *.au.auth0.com

            - Apple: appleid.apple.com

            - GitHub: github.com

            - Facebook/Meta: www.facebook.com

            - LinkedIn: www.linkedin.com

            - Amazon Cognito: *.amazoncognito.com

            - OneLogin: *.onelogin.com

            - Ping Identity: *.pingone.com, *.pingidentity.com
          example:
            - login.netflix.com
            - auth.netflix.com
        health_check_interval:
          type: integer
          minimum: 300
          maximum: 86400
          description: >
            Interval in seconds between automatic health checks. When set, the
            system periodically

            verifies the authentication status and triggers re-authentication if
            needed.

            Maximum is 86400 (24 hours). Default is 3600 (1 hour). The minimum
            depends on your plan:

            Enterprise: 300 (5 minutes), Startup: 1200 (20 minutes), Hobbyist:
            3600 (1 hour).
          example: 3600
        health_checks:
          type: boolean
          default: true
          description: >
            Whether to enable periodic health checks. When false, the system
            will not automatically

            verify authentication status, and `auto_reauth` has no effect on the
            automatic flow

            (since re-auth is only triggered by a failed scheduled health
            check). Defaults to true.
          example: true
        auto_reauth:
          type: boolean
          default: true
          description: >
            Whether to permit automatic re-authentication when a scheduled
            health check detects an

            expired session. This is an opt-in flag only — it does not check
            whether re-auth is

            actually feasible. Even when true, re-auth only runs when the system
            has what it needs

            to perform it (for example, saved credentials for the required login
            fields), and only

            after a scheduled health check detects an expired session — so this
            flag has no effect

            when `health_checks` is false. When false, expired sessions are
            marked as `NEEDS_AUTH`

            instead of attempting re-auth. Defaults to true.
          example: true
        save_credentials:
          type: boolean
          default: true
          description: >-
            Whether to save credentials after every successful login. Defaults
            to true. One-time codes (TOTP, SMS, etc.) are not saved.
          example: true
        record_session:
          type: boolean
          default: false
          description: >-
            Whether to record browser sessions for this connection by default.
            Useful for debugging. Can be overridden per-login. Defaults to
            false.
          example: false
      additionalProperties: false
    ManagedAuthUpdateRequest:
      type: object
      description: Request to update an auth connection's configuration
      properties:
        login_url:
          type: string
          format: uri
          description: Login page URL. Set to empty string to clear.
          example: https://netflix.com/login
        credential:
          $ref: '#/components/schemas/CredentialReference'
        allowed_domains:
          type: array
          items:
            type: string
          description: Additional domains valid for this auth flow (replaces existing list)
          example:
            - login.netflix.com
            - auth.netflix.com
        health_check_interval:
          type: integer
          minimum: 300
          maximum: 86400
          description: Interval in seconds between automatic health checks
          example: 3600
        health_checks:
          type: boolean
          description: >
            Whether periodic health checks are enabled. When set to false, the
            system will not

            automatically verify authentication status, and `auto_reauth` has no
            effect on the

            automatic flow (since re-auth is only triggered by a failed
            scheduled health check).
          example: true
        auto_reauth:
          type: boolean
          description: >
            Whether automatic re-authentication is permitted for this
            connection. This is an opt-in

            flag only — it does not check whether re-auth is actually feasible.
            Even when true,

            re-auth only runs when the system has what it needs to perform it
            (for example, saved

            credentials for the required login fields), and only after a
            scheduled health check

            detects an expired session — so this flag has no effect when
            `health_checks` is false.

            When false, expired sessions detected by a health check are marked
            as `NEEDS_AUTH`

            instead of attempting re-auth.
          example: true
        save_credentials:
          type: boolean
          description: Whether to save credentials after every successful login
          example: true
        record_session:
          type: boolean
          description: Whether to record browser sessions for this connection by default
          example: false
        proxy:
          $ref: '#/components/schemas/ProxyRef'
      additionalProperties: false
    LoginRequest:
      type: object
      description: Request to start a login flow
      properties:
        proxy:
          $ref: '#/components/schemas/ProxyRef'
        record_session:
          type: boolean
          description: >-
            Override the connection's default for recording this login's browser
            session. When omitted, the connection's record_session default is
            used.
          example: true
      additionalProperties: false
    LoginResponse:
      type: object
      description: Response from starting a login flow
      required:
        - id
        - flow_type
        - hosted_url
        - flow_expires_at
      properties:
        id:
          type: string
          description: Auth connection ID
          example: ma_abc123xyz
        flow_type:
          type: string
          enum:
            - LOGIN
            - REAUTH
          description: Type of login flow started
          example: LOGIN
        hosted_url:
          type: string
          format: uri
          description: URL to redirect user to for login
          example: https://auth.kernel.com/login/abc123xyz
        flow_expires_at:
          type: string
          format: date-time
          description: When the login flow expires
          example: '2025-11-05T20:00:00Z'
        handoff_code:
          type: string
          description: One-time code for handoff (internal use)
          example: aBcD123EfGh456IjKl789MnOp012QrStUvWxYzAbCdEf
        live_view_url:
          type: string
          format: uri
          description: Browser live view URL for watching the login flow
          example: https://live.onkernel.com/abc123xyz
      additionalProperties: false
    SubmitFieldsRequest:
      type: object
      description: >-
        Request to submit field values, click an SSO button, select an MFA
        method, or select a sign-in option. Provide exactly one of fields,
        sso_button_selector, sso_provider, mfa_option_id, or sign_in_option_id.
      properties:
        fields:
          type: object
          additionalProperties:
            type: string
          description: Map of field name to value
          example:
            email: user@example.com
            password: secret
        sso_button_selector:
          type: string
          description: >-
            XPath selector for the SSO button to click (ODA). Use sso_provider
            instead for CUA.
          example: xpath=//button[contains(text(), 'Continue with Google')]
        sso_provider:
          type: string
          description: >-
            SSO provider to click, matching the provider field from
            pending_sso_buttons (e.g., "google", "github"). Cannot be used with
            sso_button_selector.
          example: google
        mfa_option_id:
          type: string
          description: The MFA method type to select (when mfa_options were returned)
          example: sms
        sign_in_option_id:
          type: string
          description: The sign-in option ID to select (when sign_in_options were returned)
          example: work-account
      additionalProperties: false
    SubmitFieldsResponse:
      type: object
      description: Response from submitting field values
      required:
        - accepted
      properties:
        accepted:
          type: boolean
          description: Whether the submission was accepted for processing
      additionalProperties: false
    AuthAgentCreateRequest:
      type: object
      description: Request to create or find an auth agent
      required:
        - domain
        - profile_name
      properties:
        domain:
          type: string
          description: Domain for authentication
          example: netflix.com
        profile_name:
          type: string
          description: Name of the profile to use for this auth agent
          example: user-123
        login_url:
          type: string
          format: uri
          description: >-
            Optional login page URL. If provided, will be stored on the agent
            and used to skip discovery in future invocations.
          example: https://netflix.com/login
        proxy:
          type: object
          description: Optional proxy configuration
          properties:
            proxy_id:
              type: string
              description: ID of the proxy to use
          additionalProperties: false
        credential_name:
          type: string
          description: >-
            Optional name of an existing credential to use for this auth agent.
            If provided, the credential will be linked to the agent and its
            values will be used to auto-fill the login form on invocation.
          example: my-netflix-login
        allowed_domains:
          type: array
          items:
            type: string
          description: >
            Additional domains that are valid for this auth agent's
            authentication flow (besides the primary domain). Useful when login
            pages redirect to different domains.


            The following SSO/OAuth provider domains are automatically allowed
            by default and do not need to be specified:

            - Google: accounts.google.com

            - Microsoft/Azure AD: login.microsoftonline.com, login.live.com

            - Okta: *.okta.com, *.oktapreview.com

            - Auth0: *.auth0.com, *.us.auth0.com, *.eu.auth0.com, *.au.auth0.com

            - Apple: appleid.apple.com

            - GitHub: github.com

            - Facebook/Meta: www.facebook.com

            - LinkedIn: www.linkedin.com

            - Amazon Cognito: *.amazoncognito.com

            - OneLogin: *.onelogin.com

            - Ping Identity: *.pingone.com, *.pingidentity.com
          example:
            - login.netflix.com
            - auth.netflix.com
      additionalProperties: false
    AuthAgentInvocationCreateRequest:
      type: object
      description: Request to create an invocation for an existing auth agent
      required:
        - auth_agent_id
      properties:
        auth_agent_id:
          type: string
          description: ID of the auth agent to create an invocation for
          example: abc123xyz
        save_credential_as:
          type: string
          description: >-
            If provided, saves the submitted credentials under this name upon
            successful login. The credential will be linked to the auth agent
            for automatic re-authentication.
          example: my-netflix-login
      additionalProperties: false
    AuthAgentInvocationCreateResponse:
      type: object
      description: Response from creating an invocation. Always returns an invocation_id.
      required:
        - invocation_id
        - type
        - handoff_code
        - hosted_url
        - expires_at
      properties:
        invocation_id:
          type: string
          description: Unique identifier for the invocation.
          example: abc123xyz
        type:
          type: string
          enum:
            - login
            - reauth
          description: |
            The session type:
            - login: User-initiated authentication
            - reauth: System-triggered re-authentication (via health check)
          example: login
        handoff_code:
          type: string
          description: One-time code for handoff.
          example: aBcD123EfGh456IjKl789MnOp012QrStUvWxYzAbCdEf
        hosted_url:
          type: string
          format: uri
          description: URL to redirect user to.
          example: >-
            https://agent-auth.kernel.com/agents/auth/invocations/abc123xyz?code=abc123xyz
        expires_at:
          type: string
          format: date-time
          description: When the handoff code expires.
          example: '2025-11-05T20:00:00Z'
      additionalProperties: false
    Credential:
      type: object
      description: A stored credential for automatic re-authentication
      required:
        - id
        - name
        - domain
        - created_at
        - updated_at
      properties:
        id:
          type: string
          description: Unique identifier for the credential
          example: cred_abc123xyz
        name:
          type: string
          description: Unique name for the credential within the project
          example: my-netflix-login
        domain:
          type: string
          description: Target domain this credential is for
          example: netflix.com
        created_at:
          type: string
          format: date-time
          description: When the credential was created
          example: '2025-01-15T10:30:00Z'
        updated_at:
          type: string
          format: date-time
          description: When the credential was last updated
          example: '2025-01-15T10:30:00Z'
        has_values:
          type: boolean
          description: Whether this credential has stored values (email, password, etc.)
          example: true
        has_totp_secret:
          type: boolean
          description: >-
            Whether this credential has a TOTP secret configured for automatic
            2FA
          example: false
        sso_provider:
          type: string
          nullable: true
          description: >-
            If set, indicates this credential should be used with the specified
            SSO provider (e.g., google, github, microsoft). When the target site
            has a matching SSO button, it will be clicked first before filling
            credential values on the identity provider's login page.
          example: google
        totp_code:
          type: string
          description: >-
            Current 6-digit TOTP code. Only included in create/update responses
            when totp_secret was just set.
          example: '847291'
        totp_code_expires_at:
          type: string
          format: date-time
          description: When the totp_code expires. Only included when totp_code is present.
          example: '2025-01-15T10:30:30Z'
      additionalProperties: false
    CreateCredentialRequest:
      type: object
      description: Request to create a new credential
      required:
        - name
        - domain
        - values
      properties:
        name:
          type: string
          description: Unique name for the credential within the project
          example: my-netflix-login
        domain:
          type: string
          description: Target domain this credential is for
          example: netflix.com
        values:
          type: object
          description: Field name to value mapping (e.g., username, password)
          additionalProperties:
            type: string
          example:
            username: user@example.com
            password: mysecretpassword
        totp_secret:
          type: string
          description: >-
            Base32-encoded TOTP secret for generating one-time passwords. Used
            for automatic 2FA during login.
          example: JBSWY3DPEHPK3PXP
        sso_provider:
          type: string
          description: >-
            If set, indicates this credential should be used with the specified
            SSO provider (e.g., google, github, microsoft). When the target site
            has a matching SSO button, it will be clicked first before filling
            credential values on the identity provider's login page.
          example: google
      additionalProperties: false
    UpdateCredentialRequest:
      type: object
      description: Request to update an existing credential
      properties:
        name:
          type: string
          description: New name for the credential
          example: my-updated-login
        values:
          type: object
          description: >-
            Field name to value mapping. Values are merged with existing values
            (new keys added, existing keys overwritten).
          additionalProperties:
            type: string
          example:
            username: user@example.com
            password: newpassword
        totp_secret:
          type: string
          description: >-
            Base32-encoded TOTP secret for generating one-time passwords. Spaces
            and formatting are automatically normalized. Set to empty string to
            remove.
          example: JBSWY3DPEHPK3PXP
        sso_provider:
          type: string
          nullable: true
          description: >-
            If set, indicates this credential should be used with the specified
            SSO provider. Set to empty string or null to remove.
          example: google
      additionalProperties: false
    CredentialProvider:
      type: object
      description: >-
        An external credential provider (e.g., 1Password) for automatic
        credential lookup
      required:
        - id
        - provider_type
        - name
        - enabled
        - priority
        - created_at
        - updated_at
      properties:
        id:
          type: string
          description: Unique identifier for the credential provider
          example: credprov_abc123xyz
        provider_type:
          type: string
          description: Type of credential provider
          enum:
            - onepassword
          example: onepassword
        name:
          type: string
          description: Human-readable name for this provider instance
          example: my-1password
        enabled:
          type: boolean
          description: Whether the provider is enabled for credential lookups
          example: true
        priority:
          type: integer
          description: >-
            Priority order for credential lookups (lower numbers are checked
            first)
          example: 0
        created_at:
          type: string
          format: date-time
          description: When the credential provider was created
          example: '2025-01-15T10:30:00Z'
        updated_at:
          type: string
          format: date-time
          description: When the credential provider was last updated
          example: '2025-01-15T10:30:00Z'
      additionalProperties: false
    CreateCredentialProviderRequest:
      type: object
      description: Request to create an external credential provider
      required:
        - provider_type
        - name
        - token
      properties:
        provider_type:
          type: string
          description: Type of credential provider
          enum:
            - onepassword
          example: onepassword
        name:
          type: string
          description: Human-readable name for this provider instance (unique per org)
          example: my-1password
        token:
          type: string
          description: >-
            Service account token for the provider (e.g., 1Password service
            account token)
          example: ops_eyJhbGciOiJSUzI1NiIsInR5cCI6IkpXVCJ9...
        cache_ttl_seconds:
          type: integer
          description: How long to cache credential lists (default 300 seconds)
          default: 300
          example: 300
      additionalProperties: false
    UpdateCredentialProviderRequest:
      type: object
      description: Request to update a credential provider
      properties:
        name:
          type: string
          description: Human-readable name for this provider instance
          example: my-1password
        enabled:
          type: boolean
          description: Whether the provider is enabled for credential lookups
          example: true
        priority:
          type: integer
          description: >-
            Priority order for credential lookups (lower numbers are checked
            first)
          example: 0
        token:
          type: string
          description: New service account token (to rotate credentials)
          example: ops_eyJhbGciOiJSUzI1NiIsInR5cCI6IkpXVCJ9...
        cache_ttl_seconds:
          type: integer
          description: How long to cache credential lists
          example: 300
      additionalProperties: false
    CredentialProviderItem:
      type: object
      description: >-
        A credential item from an external provider (e.g., a 1Password login
        item)
      required:
        - id
        - title
        - vault_id
        - vault_name
        - path
      properties:
        id:
          type: string
          description: Unique identifier for the item within the provider
          example: abc123xyz
        title:
          type: string
          description: Display name of the credential item
          example: Netflix Login
        vault_id:
          type: string
          description: ID of the vault containing this item
          example: vault_abc123
        vault_name:
          type: string
          description: Name of the vault containing this item
          example: Engineering
        path:
          type: string
          description: Path to reference this item (VaultName/ItemTitle format)
          example: Engineering/Netflix Login
        urls:
          type: array
          items:
            type: string
          description: URLs associated with this credential
          example:
            - https://netflix.com
            - https://www.netflix.com
      additionalProperties: false
    CredentialReference:
      type: object
      description: |
        Reference to credentials for the auth connection. Use one of:
        - { name } for Kernel credentials
        - { provider, path } for external provider item
        - { provider, auto: true } for external provider domain lookup
      properties:
        name:
          type: string
          description: Kernel credential name
          example: my-netflix-creds
        provider:
          type: string
          description: External provider name (e.g., "my-1p")
          example: my-1p
        path:
          type: string
          description: Provider-specific path (e.g., "VaultName/ItemName" for 1Password)
          example: Personal/Netflix
        auto:
          type: boolean
          description: If true, lookup by domain from the specified provider
          example: true
      additionalProperties: false
    CredentialProviderTestResult:
      type: object
      description: Result of testing a credential provider connection
      required:
        - success
        - vaults
      properties:
        success:
          type: boolean
          description: Whether the connection test was successful
          example: true
        vaults:
          type: array
          description: List of vaults accessible by the service account
          items:
            type: object
            required:
              - id
              - name
            properties:
              id:
                type: string
                description: Vault ID
                example: abc123xyz
              name:
                type: string
                description: Vault name
                example: Shared Logins
        error:
          type: string
          description: Error message if the test failed
          example: Invalid token
      additionalProperties: false
    OkResponse:
      type: object
      description: Generic OK response.
      required:
        - ok
      properties:
        ok:
          type: boolean
          description: Indicates success.
          default: true
      additionalProperties: false
    Proxy:
      type: object
      description: Configuration for routing traffic through a proxy.
      required:
        - type
      properties:
        id:
          type: string
        name:
          type: string
          description: Readable name of the proxy.
        type:
          type: string
          description: >
            Proxy type to use. In terms of quality for avoiding bot-detection,
            from best to worst: `mobile` > `residential` > `isp` > `datacenter`.
          enum:
            - datacenter
            - isp
            - residential
            - mobile
            - custom
        protocol:
          type: string
          description: Protocol to use for the proxy connection.
          enum:
            - http
            - https
          default: https
        bypass_hosts:
          type: array
          description: Hostnames that should bypass the parent proxy and connect directly.
          items:
            type: string
        status:
          type: string
          description: Current health status of the proxy.
          enum:
            - available
            - unavailable
        last_checked:
          type: string
          format: date-time
          description: Timestamp of the last health check performed on this proxy.
        ip_address:
          type: string
          description: IP address that the proxy uses when making requests.
          example: 192.168.1.1
        config:
          description: Configuration specific to the selected proxy `type`.
          oneOf:
            - $ref: '#/components/schemas/DatacenterProxyConfig'
            - $ref: '#/components/schemas/IspProxyConfig'
            - $ref: '#/components/schemas/ResidentialProxyConfig'
            - $ref: '#/components/schemas/MobileProxyConfig'
            - $ref: '#/components/schemas/CustomProxyConfig'
      discriminator:
        propertyName: type
        mapping:
          datacenter: '#/components/schemas/DatacenterProxyConfig'
          isp: '#/components/schemas/IspProxyConfig'
          residential: '#/components/schemas/ResidentialProxyConfig'
          mobile: '#/components/schemas/MobileProxyConfig'
          custom: '#/components/schemas/CustomProxyConfig'
    ProxyCheckRequest:
      type: object
      description: Optional parameters for the proxy health check.
      properties:
        url:
          type: string
          description: >-
            An optional URL to test reachability against. If provided, the proxy
            check will test connectivity to this URL instead of the default test
            URLs. Only HTTP and HTTPS schemes are allowed, and the URL must
            resolve to a public IP address. For ISP and datacenter proxies, the
            exit IP is stable, so a successful check reliably indicates that
            subsequent browser sessions will reach the target site with the same
            IP. For residential and mobile proxies, the exit node changes
            between requests, so a successful check validates proxy
            configuration but does not guarantee that a subsequent browser
            session will use the same exit IP or reach the same site — it is
            useful for verifying credentials and connectivity, not for
            predicting site-specific behavior. When provided, the check result
            does not update the proxy's health status, since a failure may
            indicate a problem with the target site rather than the proxy
            itself.
    ProxyCreateRequest:
      type: object
      description: Configuration for routing traffic through a proxy.
      required:
        - type
      properties:
        name:
          type: string
          description: Readable name of the proxy.
        type:
          type: string
          description: >
            Proxy type to use. In terms of quality for avoiding bot-detection,
            from best to worst: `mobile` > `residential` > `isp` > `datacenter`.
          enum:
            - datacenter
            - isp
            - residential
            - mobile
            - custom
        protocol:
          type: string
          description: Protocol to use for the proxy connection.
          enum:
            - http
            - https
          default: https
        bypass_hosts:
          type: array
          description: Hostnames that should bypass the parent proxy and connect directly.
          items:
            type: string
        config:
          description: Configuration specific to the selected proxy `type`.
          oneOf:
            - $ref: '#/components/schemas/DatacenterProxyConfig'
            - $ref: '#/components/schemas/IspProxyConfig'
            - $ref: '#/components/schemas/ResidentialProxyConfig'
            - $ref: '#/components/schemas/MobileProxyConfig'
            - $ref: '#/components/schemas/CreateCustomProxyConfig'
      discriminator:
        propertyName: type
        mapping:
          datacenter: '#/components/schemas/DatacenterProxyConfig'
          isp: '#/components/schemas/IspProxyConfig'
          residential: '#/components/schemas/ResidentialProxyConfig'
          mobile: '#/components/schemas/MobileProxyConfig'
          custom: '#/components/schemas/CustomProxyConfig'
    DatacenterProxyConfig:
      type: object
      description: Configuration for a datacenter proxy.
      properties:
        country:
          type: string
          description: ISO 3166 country code. Defaults to US if not provided.
          example: US
    IspProxyConfig:
      type: object
      description: Configuration for an ISP proxy.
      properties:
        country:
          type: string
          description: ISO 3166 country code. Defaults to US if not provided.
          example: US
    ResidentialProxyConfig:
      type: object
      description: Configuration for residential proxies.
      properties:
        country:
          type: string
          description: ISO 3166 country code.
          example: US
        city:
          type: string
          description: >-
            City name (no spaces, e.g. `sanfrancisco`). If provided, `country`
            must also be provided.
          example: sanfrancisco
        state:
          type: string
          description: Two-letter state code.
          example: CA
        zip:
          type: string
          description: US ZIP code.
          example: '94107'
        asn:
          type: string
          description: >-
            Autonomous system number. See
            https://bgp.potaroo.net/cidr/autnums.html
          example: AS15169
        os:
          type: string
          description: Operating system of the residential device.
          deprecated: true
          x-deprecated-reason: os selection not supported by proxy provider
          enum:
            - windows
            - macos
            - android
    MobileProxyConfig:
      x-hidden: true
      x-deprecated: true
      x-deprecated-reason: Mobile proxies not reliable enough from our proxy provider
      type: object
      description: Configuration for mobile proxies.
      properties:
        country:
          type: string
          description: ISO 3166 country code
          example: US
        city:
          type: string
          description: >-
            City name (no spaces, e.g. `sanfrancisco`). If provided, `country`
            must also be provided.
          example: sanfrancisco
        state:
          type: string
          description: Two-letter state code.
          example: CA
        zip:
          type: string
          description: US ZIP code.
          example: '94107'
        asn:
          type: string
          description: >-
            Autonomous system number. See
            https://bgp.potaroo.net/cidr/autnums.html
          example: AS15169
        carrier:
          type: string
          description: Mobile carrier.
          enum:
            - a1
            - aircel
            - airtel
            - att
            - celcom
            - chinamobile
            - claro
            - comcast
            - cox
            - digi
            - dt
            - docomo
            - dtac
            - etisalat
            - idea
            - kyivstar
            - meo
            - megafon
            - mtn
            - mtnza
            - mts
            - optus
            - orange
            - qwest
            - reliance_jio
            - robi
            - sprint
            - telefonica
            - telstra
            - tmobile
            - tigo
            - tim
            - verizon
            - vimpelcom
            - vodacomza
            - vodafone
            - vivo
            - zain
            - vivabo
            - telenormyanmar
            - kcelljsc
            - swisscom
            - singtel
            - asiacell
            - windit
            - cellc
            - ooredoo
            - drei
            - umobile
            - cableone
            - proximus
            - tele2
            - mobitel
            - o2
            - bouygues
            - free
            - sfr
            - digicel
    CustomProxyConfig:
      type: object
      description: Configuration for a custom proxy (e.g., private proxy server).
      required:
        - host
        - port
      properties:
        host:
          type: string
          description: Proxy host address or IP.
          example: 127.0.0.1
        port:
          type: integer
          description: Proxy port.
          example: 8080
        username:
          type: string
          description: Username for proxy authentication.
          example: user123
        has_password:
          type: boolean
          description: Whether the proxy has a password.
          example: true
    CreateCustomProxyConfig:
      type: object
      description: Configuration for a custom proxy (e.g., private proxy server).
      required:
        - host
        - port
      properties:
        host:
          type: string
          description: Proxy host address or IP.
          example: 127.0.0.1
        port:
          type: integer
          description: Proxy port.
          example: 8080
        username:
          type: string
          description: Username for proxy authentication.
          example: user123
        password:
          type: string
          description: Password for proxy authentication.
          example: secret
    ClickMouseRequest:
      type: object
      required:
        - x
        - 'y'
      properties:
        button:
          type: string
          description: Mouse button to interact with
          enum:
            - left
            - right
            - middle
            - back
            - forward
        click_type:
          type: string
          description: Type of click action
          enum:
            - down
            - up
            - click
        x:
          type: integer
          description: X coordinate of the click position
        'y':
          type: integer
          description: Y coordinate of the click position
        hold_keys:
          type: array
          description: Modifier keys to hold during the click
          items:
            type: string
        num_clicks:
          type: integer
          description: Number of times to repeat the click
          default: 1
      additionalProperties: false
    MoveMouseRequest:
      type: object
      required:
        - x
        - 'y'
      properties:
        x:
          type: integer
          description: X coordinate to move the cursor to
        'y':
          type: integer
          description: Y coordinate to move the cursor to
        hold_keys:
          type: array
          description: Modifier keys to hold during the move
          items:
            type: string
        smooth:
          type: boolean
          description: Use human-like Bezier curve path instead of instant mouse movement.
          default: true
        duration_ms:
          type: integer
          description: >-
            Target total duration in milliseconds for the mouse movement when
            smooth=true. Omit for automatic timing based on distance.
          minimum: 50
          maximum: 5000
      additionalProperties: false
    MousePositionResponse:
      type: object
      required:
        - x
        - 'y'
      properties:
        x:
          type: integer
          description: X coordinate of the cursor
        'y':
          type: integer
          description: Y coordinate of the cursor
      additionalProperties: false
    ClipboardContent:
      type: object
      required:
        - text
      properties:
        text:
          type: string
          description: Current clipboard text content
      additionalProperties: false
    WriteClipboardRequest:
      type: object
      required:
        - text
      properties:
        text:
          type: string
          description: Text to write to the system clipboard
      additionalProperties: false
    ScreenshotRegion:
      type: object
      required:
        - x
        - 'y'
        - width
        - height
      properties:
        x:
          type: integer
          description: X coordinate of the region's top-left corner
        'y':
          type: integer
          description: Y coordinate of the region's top-left corner
        width:
          type: integer
          description: Width of the region in pixels
        height:
          type: integer
          description: Height of the region in pixels
      additionalProperties: false
    ScreenshotRequest:
      type: object
      properties:
        region:
          $ref: '#/components/schemas/ScreenshotRegion'
      additionalProperties: false
    TypeTextRequest:
      type: object
      required:
        - text
      properties:
        text:
          type: string
          description: Text to type on the browser instance
        delay:
          type: integer
          description: Delay in milliseconds between keystrokes
          minimum: 0
          default: 0
      additionalProperties: false
    PressKeyRequest:
      type: object
      required:
        - keys
      properties:
        keys:
          type: array
          description: >
            List of key symbols to press. Each item should be a key symbol
            supported by xdotool

            (see X11 keysym definitions). Examples include "Return", "Shift",
            "Ctrl", "Alt", "F5".

            Items in this list could also be combinations, e.g. "Ctrl+t" or
            "Ctrl+Shift+Tab".
          items:
            type: string
        duration:
          type: integer
          description: >-
            Duration to hold the keys down in milliseconds. If omitted or 0,
            keys are tapped.
          minimum: 0
          default: 0
        hold_keys:
          type: array
          description: Optional modifier keys to hold during the key press sequence.
          items:
            type: string
      additionalProperties: false
    ScrollRequest:
      type: object
      required:
        - x
        - 'y'
      properties:
        x:
          type: integer
          description: X coordinate at which to perform the scroll
        'y':
          type: integer
          description: Y coordinate at which to perform the scroll
        delta_x:
          type: integer
          description: >-
            Horizontal scroll amount in xdotool "wheel units." Positive scrolls
            right, negative scrolls left.
          default: 0
        delta_y:
          type: integer
          description: >-
            Vertical scroll amount in xdotool "wheel units." Positive scrolls
            down, negative scrolls up.
          default: 0
        hold_keys:
          type: array
          description: Modifier keys to hold during the scroll
          items:
            type: string
      additionalProperties: false
    DragMouseRequest:
      type: object
      required:
        - path
      properties:
        path:
          type: array
          description: >-
            Ordered list of [x, y] coordinate pairs to move through while
            dragging. Must contain at least 2 points.
          minItems: 2
          items:
            type: array
            minItems: 2
            maxItems: 2
            items:
              type: integer
        button:
          type: string
          description: Mouse button to drag with
          enum:
            - left
            - middle
            - right
        delay:
          type: integer
          description: >-
            Delay in milliseconds between button down and starting to move along
            the path.
          minimum: 0
          default: 0
        steps_per_segment:
          type: integer
          description: Number of relative move steps per segment in the path. Minimum 1.
          minimum: 1
          default: 10
        step_delay_ms:
          type: integer
          description: >-
            Delay in milliseconds between relative steps while dragging (not the
            initial delay).
          minimum: 0
          default: 50
        hold_keys:
          type: array
          description: Modifier keys to hold during the drag
          items:
            type: string
        smooth:
          type: boolean
          description: >-
            Use human-like Bezier curves between path waypoints instead of
            linear interpolation. When true, steps_per_segment and step_delay_ms
            are ignored.
          default: true
        duration_ms:
          type: integer
          description: >-
            Target total duration in milliseconds for the entire drag movement
            when smooth=true. Omit for automatic timing based on total path
            length.
          minimum: 50
          maximum: 10000
      additionalProperties: false
    SetCursorRequest:
      type: object
      required:
        - hidden
      properties:
        hidden:
          type: boolean
          description: Whether the cursor should be hidden or visible
      additionalProperties: false
    SleepAction:
      type: object
      description: Pause execution for a specified duration.
      required:
        - duration_ms
      properties:
        duration_ms:
          type: integer
          description: Duration to sleep in milliseconds.
          minimum: 0
          maximum: 30000
      additionalProperties: false
    ComputerAction:
      type: object
      description: >
        A single computer action to execute as part of a batch. The `type` field
        selects which

        action to perform, and the corresponding field contains the action
        parameters.

        Exactly one action field matching the type must be provided.
      required:
        - type
      properties:
        type:
          type: string
          description: The type of action to perform.
          enum:
            - click_mouse
            - move_mouse
            - type_text
            - press_key
            - scroll
            - drag_mouse
            - set_cursor
            - sleep
        click_mouse:
          $ref: '#/components/schemas/ClickMouseRequest'
        move_mouse:
          $ref: '#/components/schemas/MoveMouseRequest'
        type_text:
          $ref: '#/components/schemas/TypeTextRequest'
        press_key:
          $ref: '#/components/schemas/PressKeyRequest'
        scroll:
          $ref: '#/components/schemas/ScrollRequest'
        drag_mouse:
          $ref: '#/components/schemas/DragMouseRequest'
        set_cursor:
          $ref: '#/components/schemas/SetCursorRequest'
        sleep:
          $ref: '#/components/schemas/SleepAction'
      additionalProperties: false
    BatchComputerActionRequest:
      type: object
      description: A batch of computer actions to execute sequentially.
      required:
        - actions
      properties:
        actions:
          type: array
          description: >-
            Ordered list of actions to execute. Execution stops on the first
            error.
          minItems: 1
          maxItems: 100
          items:
            $ref: '#/components/schemas/ComputerAction'
      additionalProperties: false
    ApiKeyCreator:
      type: object
      required:
        - id
        - email
        - name
      properties:
        id:
          type: string
          description: Kernel user ID of the creator.
          example: user-abc123
        email:
          type: string
          format: email
          description: Email address of the creator.
          example: user@example.com
        name:
          type: string
          nullable: true
          description: Display name of the creator, if available.
          example: Jane Doe
    ApiKey:
      type: object
      required:
        - id
        - name
        - created_at
        - created_by
        - expires_at
        - project_id
        - project_name
        - masked_key
      properties:
        id:
          type: string
          description: Unique API key identifier
          example: ckv9w8q2f000001l5r3j7k9m4
        name:
          type: string
          description: API key name
          example: production
        created_at:
          type: string
          format: date-time
          description: When the API key was created
        created_by:
          $ref: '#/components/schemas/ApiKeyCreator'
        expires_at:
          type: string
          format: date-time
          description: When the API key expires
          nullable: true
        project_id:
          type: string
          description: Project identifier for project-scoped API keys. Null means org-wide.
          example: proj_abc123
          nullable: true
        project_name:
          type: string
          description: >-
            Project name for project-scoped API keys. Null means the key is
            org-wide or the project name is unavailable.
          example: Production
          nullable: true
        masked_key:
          type: string
          description: Masked version of the API key
          example: sk_1234...abcd
    CreatedApiKey:
      description: >-
        API key returned immediately after creation. Includes the plaintext key
        once.
      allOf:
        - $ref: '#/components/schemas/ApiKey'
        - type: object
          required:
            - key
          properties:
            key:
              type: string
              description: Plaintext API key. Only returned once when the key is created.
              example: sk_1234abcd
    CreateApiKeyRequest:
      type: object
      required:
        - name
      properties:
        name:
          type: string
          description: API key name (1-255 characters)
          minLength: 1
          maxLength: 255
          example: staging
        days_to_expire:
          type: integer
          description: Number of days until expiry, up to 3650. Use null for never.
          minimum: 1
          maximum: 3650
          example: 30
          nullable: true
        project_id:
          type: string
          description: Unique project identifier
          example: proj_abc123
          nullable: true
    UpdateApiKeyRequest:
      type: object
      required:
        - name
      properties:
        name:
          type: string
          description: New API key name
          minLength: 1
          maxLength: 255
          example: new-api-name
    Project:
      type: object
      required:
        - id
        - name
        - status
        - created_at
        - updated_at
      properties:
        id:
          type: string
          description: Unique project identifier
          example: proj_abc123
        name:
          type: string
          description: Project name
          example: production
        status:
          type: string
          enum:
            - active
            - archived
          description: Project status
          example: active
        created_at:
          type: string
          format: date-time
          description: When the project was created
        updated_at:
          type: string
          format: date-time
          description: When the project was last updated
    CreateProjectRequest:
      type: object
      required:
        - name
      properties:
        name:
          type: string
          description: Project name (1-255 characters)
          example: staging
    UpdateProjectRequest:
      type: object
      properties:
        name:
          type: string
          description: New project name
        status:
          type: string
          enum:
            - active
            - archived
          description: New project status
    ProjectLimits:
      type: object
      properties:
        max_concurrent_sessions:
          type: integer
          nullable: true
          description: >-
            Maximum concurrent browser sessions for this project. Null means no
            project-level cap.
          example: 10
        max_concurrent_invocations:
          type: integer
          nullable: true
          description: >-
            Maximum concurrent app invocations for this project. Null means no
            project-level cap.
          example: 20
        max_pooled_sessions:
          type: integer
          nullable: true
          description: >-
            Maximum pooled sessions capacity for this project. Null means no
            project-level cap.
          example: 50
    UpdateProjectLimitsRequest:
      type: object
      properties:
        max_concurrent_sessions:
          type: integer
          nullable: true
          description: >-
            Maximum concurrent browser sessions for this project. Set to 0 to
            remove the cap; omit to leave unchanged.
        max_concurrent_invocations:
          type: integer
          nullable: true
          description: >-
            Maximum concurrent app invocations for this project. Set to 0 to
            remove the cap; omit to leave unchanged.
        max_pooled_sessions:
          type: integer
          nullable: true
          description: >-
            Maximum pooled sessions capacity for this project. Set to 0 to
            remove the cap; omit to leave unchanged.
  responses:
    Unauthorized:
      description: Unauthorized – missing or invalid authorization token
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    BadRequest:
      description: Bad Request – invalid input
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    TooManyRequests:
      description: Too Many Requests – rate limit exceeded
      headers:
        Retry-After:
          description: Seconds to wait before retrying
          schema:
            type: integer
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    Conflict:
      description: Conflict – resource already exists
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    Forbidden:
      description: Forbidden – insufficient permissions or plan
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    UnprocessableEntity:
      description: Unprocessable Entity – request was valid but the operation failed
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    InternalError:
      description: Internal Server Error
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    CapacityExhausted:
      description: Capacity exhausted, unable to fulfill request at this time
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    Gone:
      description: Resource expired or no longer available
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
security:
  - bearerAuth: []
tags:
  - name: Browsers
    description: Create and manage browser sessions.
  - name: Browser Replays
    description: Record and manage browser session video replays.
  - name: Profiles
    description: Create, list, retrieve, and delete browser profiles.
  - name: Browser Filesystem
    description: Read, write, and manage files on the browser instance.
  - name: Browser Computer Controls
    description: Control mouse, keyboard, and screen on the browser instance.
  - name: Browser Playwright
    description: Execute Playwright code against the browser instance.
  - name: Browser Processes
    description: Execute and manage processes on the browser instance.
  - name: Browser Logs
    description: Stream logs from the browser instance.
  - name: Browser Telemetry
    description: Stream live telemetry events from a browser session.
  - name: Extensions
    description: Create, list, retrieve, and delete browser extensions.
  - name: Proxies
    description: Create and manage proxy configurations for routing browser traffic.
  - name: Browser Pools
    description: Create and manage browser pools for acquiring and releasing browsers.
  - name: Managed Auth
    description: >-
      Create and manage auth connections for automated credential capture and
      login.
  - name: Credentials
    description: Create and manage credentials for authentication.
  - name: Credential Providers
    description: Configure external credential providers like 1Password.
  - name: Apps
    description: List applications and versions.
  - name: Deployments
    description: Create and manage app deployments and stream deployment events.
  - name: Invocations
    description: Invoke actions and stream or query invocation status and events.
  - name: Projects
    description: Create and manage projects for resource isolation within an organization.
  - name: API Keys
    description: Create and manage API keys for organization and project-scoped access.
paths:
  /invocations:
    post:
      operationId: postInvocations
      tags:
        - Invocations
      summary: Invoke an action
      description: Invoke an action.
      security:
        - bearerAuth: []
      requestBody:
        description: Invocation parameters
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                app_name:
                  type: string
                  description: Name of the application
                  example: my-app
                version:
                  type: string
                  description: Version of the application
                  example: 1.0.0
                  default: latest
                payload:
                  type: string
                  description: Input data for the action, sent as a JSON string.
                  example: '{"data":"example input"}'
                action_name:
                  type: string
                  description: Name of the action to invoke
                  example: analyze
                async:
                  type: boolean
                  description: >-
                    If true, invoke asynchronously. When set, the API responds
                    202 Accepted with status "queued".
                  example: true
                  default: false
                async_timeout_seconds:
                  type: integer
                  description: >-
                    Timeout in seconds for async invocations (min 10, max 3600).
                    Only applies when async is true.
                  example: 600
                  default: 900
                  minimum: 10
                  maximum: 3600
              required:
                - app_name
                - version
                - action_name
      responses:
        '200':
          description: Invocation created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InvokeResponse'
        '202':
          description: Invocation queued successfully (asynchronous invocation)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InvokeResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
        '429':
          $ref: '#/components/responses/TooManyRequests'
        '500':
          $ref: '#/components/responses/InternalError'
      x-codeSamples:
        - lang: JavaScript
          source: |-
            import Kernel from '@onkernel/sdk';

            const client = new Kernel({
              apiKey: process.env['KERNEL_API_KEY'], // This is the default and can be omitted
            });

            const invocation = await client.invocations.create({
              action_name: 'analyze',
              app_name: 'my-app',
              version: '1.0.0',
            });

            console.log(invocation.id);
        - lang: Python
          source: |-
            import os
            from kernel import Kernel

            client = Kernel(
                api_key=os.environ.get("KERNEL_API_KEY"),  # This is the default and can be omitted
            )
            invocation = client.invocations.create(
                action_name="analyze",
                app_name="my-app",
                version="1.0.0",
            )
            print(invocation.id)
        - lang: Go
          source: "package main\n\nimport (\n\t\"context\"\n\t\"fmt\"\n\n\t\"github.com/kernel/kernel-go-sdk\"\n\t\"github.com/kernel/kernel-go-sdk/option\"\n)\n\nfunc main() {\n\tclient := kernel.NewClient(\n\t\toption.WithAPIKey(\"My API Key\"),\n\t)\n\tinvocation, err := client.Invocations.New(context.TODO(), kernel.InvocationNewParams{\n\t\tActionName: \"analyze\",\n\t\tAppName:    \"my-app\",\n\t\tVersion:    \"1.0.0\",\n\t})\n\tif err != nil {\n\t\tpanic(err.Error())\n\t}\n\tfmt.Printf(\"%+v\\n\", invocation.ID)\n}\n"
    get:
      operationId: getInvocations
      tags:
        - Invocations
      summary: List invocations
      description: >-
        List invocations. Optionally filter by application name, action name,
        status, deployment ID, or start time.
      security:
        - bearerAuth: []
      parameters:
        - name: app_name
          in: query
          required: false
          description: Filter results by application name.
          schema:
            type: string
        - name: version
          in: query
          required: false
          description: Filter results by application version.
          schema:
            type: string
        - name: action_name
          in: query
          required: false
          description: Filter results by action name.
          schema:
            type: string
        - name: deployment_id
          in: query
          required: false
