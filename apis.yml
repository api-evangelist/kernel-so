access: 3rd-Party
description: Kernel is browser infrastructure for AI agents and web automations. Founded
  in 2025 by Catherine Jue (CEO) and Rafael Garcia (CTO) and backed by Accel and Y
  Combinator (S25), Kernel runs sandboxed Chromium browsers on a unikernel platform
  with sub-150ms cold starts, built-in stealth mode, residential proxies, CAPTCHA
  solving, session recording, live view, persistent profiles, and a serverless app
  platform that co-locates agent code with browsers. Kernel works with Playwright,
  Puppeteer, Browser Use, Stagehand, Magnitude, Notte, and the Anthropic/OpenAI/Gemini
  computer-use loops. The REST API at api.onkernel.com exposes browsers, browser
  pools, profiles, proxies, replays, extensions, computer controls, filesystem,
  processes, Playwright execution, managed auth, credentials, apps, deployments,
  invocations, and projects.
created: '2026-05-25'
modified: '2026-05-25'
apis:
- aid: kernel-so:kernel-api
  name: Kernel API
  description: The Kernel REST API at api.onkernel.com is the unified control plane
    for browser infrastructure. It exposes browser session lifecycle, browser pools,
    profiles, proxies, replays, extensions, computer-use controls (mouse, keyboard,
    clipboard, screenshots, batch actions), in-browser filesystem and process exec,
    Playwright execution, log and telemetry streaming, managed auth connections,
    credentials, credential providers, apps, deployments, invocations, projects,
    and API keys. Bearer-token authenticated; OpenAPI 3.1 published via Stainless.
  humanURL: https://www.kernel.sh/docs/api-reference/
  baseURL: https://api.onkernel.com
  version: '0.1.0'
  tags:
  - Agents
  - Browser Automation
  - Browsers
  - Computer Use
  - Headless Browsers
  - Playwright
  - Web Agents
  properties:
  - url: https://www.kernel.sh/docs/api-reference/
    type: Documentation
  - url: https://www.kernel.sh/docs/
    type: Documentation
  - url: https://www.kernel.sh/docs/llms.txt
    type: LLMSTXT
  - url: openapi/kernel-openapi.yml
    type: OpenAPI
  - url: https://app.stainless.com/api/spec/documented/kernel/openapi.documented.yml
    type: OpenAPI
- aid: kernel-so:kernel-mcp-server
  name: Kernel MCP Server
  description: Hosted Model Context Protocol server at mcp.onkernel.com that exposes
    Kernel resources (browsers, profiles, proxies, apps) as MCP tools and bundles
    four standalone tools — computer actions, Playwright execution with replay,
    shell exec, and documentation search — to Claude, Cursor, VS Code, Zed, and any
    MCP-compatible agent. Authenticates via OAuth 2.1 or API key.
  humanURL: https://www.kernel.sh/docs/reference/mcp-server
  baseURL: https://mcp.onkernel.com/mcp
  tags:
  - Agents
  - MCP
  properties:
